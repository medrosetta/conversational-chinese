function renderAssessmentStep() {
  const el = document.getElementById('pathway-content');
  const q = ASSESSMENT_QUESTIONS[assessmentStep];
  const total = ASSESSMENT_QUESTIONS.length;
  const current = assessmentAnswers[q.id];

  const pips = ASSESSMENT_QUESTIONS.map((_, i) => {
    const cls = i < assessmentStep ? 'done' : i === assessmentStep ? 'active' : '';
    return `<div class="assessment-pip ${cls}"></div>`;
  }).join('');

  const options = q.options.map(opt => `

  el.innerHTML = `

      <div class="assessment-q-label">Question ${assessmentStep + 1} of ${total}</div>

    <div class="assessment-nav">
      <button class="assessment-back-btn" onclick="${assessmentStep === 0 ? 'renderPathwayHome()' : 'assessmentBack()'}">${assessmentStep === 0 ? 'Cancel' : '← Back'}</button>
      <button class="assessment-next-btn${current ? ' enabled' : ''}" id="assess-next-btn"
        onclick="assessmentNext()">
        ${assessmentStep === total - 1 ? 'See My Path →' : 'Next →'}
      </button>

function selectAssessmentOption(qid, value) {
  assessmentAnswers[qid] = value;
  // Set language immediately on Q2
  if (qid === 'language' && (value === 'yue' || value === 'both')) setLang('yue');
  if (qid === 'language' && value === 'cmn') setLang('cmn');
  renderAssessmentStep();
}

function assessmentBack() {
  if (assessmentStep > 0) {
    assessmentStep--;
    renderAssessmentStep();
  }
}

function assessmentNext() {
  const q = ASSESSMENT_QUESTIONS[assessmentStep];
  if (!assessmentAnswers[q.id]) return;

  if (assessmentStep < ASSESSMENT_QUESTIONS.length - 1) {
    assessmentStep++;
    renderAssessmentStep();
  } else {
    // Build and save pathway
    const seq = buildLessonSequence(assessmentAnswers);
    const pathway = {
      answers: assessmentAnswers,
      sequence: seq,
      position: 0,
      dateCreated: new Date().toISOString(),
    };
    savePathway(pathway);
    renderPathwayResult(pathway, false);
  }
}

function renderPathwayResult(pathway, isReturn) {
  const el = document.getElementById('pathway-content');
  const lessons = getLessons();
  const completed = getCompletedLessons();
  const { answers, sequence } = pathway;

  const roleLabels = { doctor:'Physician', nurse:'Nurse / NP / PA', assistant:'Medical Assistant',
    student:'Student', chw:'Community Health Worker', pharmacist:'Pharmacist' };
  const goalLabels = { foundations:'Clinical Foundations', interview:'Patient Interview',
    specialty:'Specialty Vocabulary', urgent:'Urgent & Emergency', education:'Patient Education',
    goals:'Goals of Care' };

  const roleLabel = roleLabels[answers.role] || answers.role;
  const goalLabel = goalLabels[answers.goal] || answers.goal;
  const langLabel = answers.language === 'cmn' ? 'Mandarin' : 'Cantonese';
  const pctDone = sequence.length > 0
    ? Math.round(sequence.filter(i => completed.includes(i)).length / sequence.length * 100) : 0;

  // First item is "start here"
  const lessonItems = sequence.slice(0, 10).map((idx, pos) => {
    const l = lessons[idx];
    if (!l) return '';
    const isDone = completed.includes(idx);
    const isStart = pos === 0 && !isDone;
    const priorities = getPrioritySections(idx);
    const focusText = priorities.length > 0
      ? 'Focus: ' + priorities.slice(0,2).join(' · ')
      : '';

    return `<div class="pathway-lesson-item${isStart ? ' start-here' : ''}"
      onclick="jumpToLesson(${idx})">
      <div class="pathway-lesson-num">${isDone ? '✓' : pos + 1}</div>
      <div class="pathway-lesson-body">
        ${isStart ? '<div class="pathway-start-here-badge">START HERE</div>' : ''}
        <div class="pathway-lesson-title">${l.en}</div>
        ${focusText ? `<div class="pathway-lesson-focus">${focusText}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  const moreCount = sequence.length > 10 ? sequence.length - 10 : 0;

  el.innerHTML = `
    <div class="pathway-result fade-in">
      <div class="pathway-result-header">
        <div class="pathway-result-label">${isReturn ? 'Your Learning Path' : 'Path Ready'}</div>
        <div class="pathway-result-title">${roleLabel} · ${langLabel}</div>
        <div class="pathway-result-sub">${goalLabel} · ${sequence.length} lessons · ${pctDone}% complete</div>
      </div>
      <div class="pathway-lesson-list">
        ${lessonItems}
        ${moreCount > 0 ? `<div style="font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--muted);padding:10px 0;letter-spacing:0.08em">+ ${moreCount} more lessons in your path</div>` : ''}
      </div>
      <div class="pathway-actions">
        <button class="pathway-action-btn primary" onclick="jumpToLesson(${sequence[0]})">Start Learning →</button>
        <button class="pathway-action-btn" onclick="startAssessment()">Retake Assessment</button>
        <button class="pathway-action-btn" onclick="clearPathway();renderPathwayHome()">Clear Path</button>
      </div>
    </div>
    <div class="feature-rating-bar">Was <strong>My Path</strong> useful?&nbsp;<button class="feature-thumb-btn" onclick="rateFeature(this,'My Path','up')">👍</button>&nbsp;<button class="feature-thumb-btn" onclick="rateFeature(this,'My Path','down')">👎</button></div>`;
}

// Registers an inline service worker for offline support & home screen install
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'conversational-chinese-v2';
    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE).then(c => c.addAll(['${location.href}']))
      );
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('${location.href}')))
      );
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope: './'}).then(reg => {
    // Detect when a new service worker takes over — show update banner
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      if (!newWorker) return;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
          showUpdateBanner();
        }
      });
    });
  }).catch(() => {});

  // Also detect controller change (new SW claimed clients)
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    showUpdateBanner();
  });
}

function showUpdateBanner() {
  if (document.getElementById('update-banner')) return; // already shown
  const banner = document.createElement('div');
  banner.id = 'update-banner';
  banner.innerHTML = `
    <span>🔄 ConversationalChinese has been updated</span>
    <button onclick="window.location.reload()">Reload</button>
    <button onclick="this.parentElement.remove()" style="background:none;border:none;color:rgba(245,240,232,0.6);cursor:pointer;font-size:1rem;padding:0 4px">✕</button>
  `;
  document.body.appendChild(banner);
}

function toggleDrawer(forceClose) {
  const aside = document.querySelector('aside');
  const backdrop = document.getElementById('drawer-backdrop');
  const fab = document.getElementById('mobile-fab');
  if (!aside || !backdrop) return;

  const isOpen = aside.classList.contains('drawer-open');
  if (forceClose || isOpen) {
    aside.classList.remove('drawer-open');
    backdrop.classList.remove('open');
    if (fab) fab.classList.remove('hidden');
    document.body.style.overflow = '';
  } else {
    // Switch to Lessons tab when opening drawer
    navSelectLessons();
    // Position drawer below fixed header+nav
    const header = document.getElementById('main-header');
    const nav = document.getElementById('top-nav');
    const offset = (header ? header.getBoundingClientRect().bottom : 0) +
                   (nav ? nav.getBoundingClientRect().height : 0);
    aside.style.top = offset + 'px';
    aside.style.height = (window.innerHeight - offset) + 'px';
    aside.classList.add('drawer-open');
    backdrop.classList.add('open');
    if (fab) fab.classList.add('hidden');
    document.body.style.overflow = 'hidden';
  }
}

const FEEDBACK_FALLBACK_EMAIL = 'waikiulee@gmail.com';

let _feedbackSourceBtn = null;
let _feedbackMode = 'error'; // 'error' | 'thumb_up' | 'thumb_down'

// ── Silent background submit to Apps Script ───────────────────────────────────
async function sendFeedback(data) {
  try {
    const payload = {
      ...data,
      timestamp: new Date().toISOString(),
      language: currentLang === 'cmn' ? 'Mandarin' : 'Cantonese'
    };
    // Use GET with query params — most reliable with no-cors from static pages
    const params = new URLSearchParams();
    Object.keys(payload).forEach(k => params.append(k, payload[k] || ''));
    await fetch(APPS_SCRIPT_URL + '?' + params.toString(), {
      method: 'GET',
      mode: 'no-cors'
    });
  } catch(e) {
    console.warn('Feedback send failed:', e);
    // Fallback: open pre-filled email
    const subject = encodeURIComponent('ConversationalChinese Feedback: ' + (data.lesson || ''));
    const body = encodeURIComponent(
      'Type: ' + (data.type || '') + '\n' +
      'Item: ' + (data.item || '') + '\n' +
      'Lesson: ' + (data.lesson || '') + '\n' +
      'Rating: ' + (data.rating || '') + '\n' +
      'Error: ' + (data.errorType || '') + '\n' +
      'Comments: ' + (data.comments || '')
    );
    window.location.href = 'mailto:' + FEEDBACK_FALLBACK_EMAIL + '?subject=' + subject + '&body=' + body;
  }
}

function openFeedback(zh, en, lessonName, sourceBtn) {

function selectFeedbackType(btn, type) {
  document.querySelectorAll('.feedback-option').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  _feedbackType = type;
  document.getElementById('feedback-submit-btn').disabled = false;
}

function closeFeedback() {
  document.getElementById('feedback-overlay').classList.remove('open');
  _feedbackType = '';
  _feedbackMode = 'error';
}

function submitFeedback() {
  trackEvent('feedback_submit', { type: _feedbackMode || 'unknown' });
  const comments = document.getElementById('feedback-comment').value.trim();
  const lessonName = _feedbackContext.lesson || getLessonName(cur);

  if (_feedbackMode === 'error') {
    if (!_feedbackType) return;
    sendFeedback({
      type: 'vocab_error',
      item: _feedbackContext.item,
      lesson: lessonName,
      errorType: _feedbackType,
      comments: comments
    });
    if (_feedbackSourceBtn) {
      _feedbackSourceBtn.classList.add('submitted');
      _feedbackSourceBtn.title = 'Reported ✓';
    }
  } else if (_feedbackMode === 'thumb_down') {
    if (comments) {
      sendFeedback({
        type: 'vocab_comment',
        item: _feedbackContext.item,
        lesson: lessonName,
        rating: 'down',
        comments: comments
      });
    }
  } else if (_feedbackMode === 'lesson_down') {
    sendFeedback({
      type: 'lesson_rating',
      item: lessonName,
      lesson: lessonName,
      rating: 'down',
      comments: comments
    });
  } else if (_feedbackMode === 'section_down') {
    sendFeedback({
      type: 'section_rating',
      item: _feedbackContext.item,
      lesson: _feedbackContext.lesson,
      rating: 'down',
      comments: comments
    });
  } else if (_feedbackMode === 'dialogue_down') {
    sendFeedback({
      type: 'dialogue_rating',
      item: _feedbackContext.item,
      lesson: _feedbackContext.lesson,
      rating: 'down',
      comments: comments
    });
  } else if (_feedbackMode === 'feature_down') {
    sendFeedback({
      type: 'feature_rating',
      item: _feedbackContext.item,
      lesson: _feedbackContext.item,
      rating: 'down',
      comments: comments
    });
  }

  closeFeedback();
}

// ── Overall survey submit ─────────────────────────────────────────────────────
function submitSurvey() {
  const getValue = id => {
    const el = document.getElementById(id);
    return el ? el.value || '' : '';
  };
  const getSelected = cls => {
    const el = document.querySelector('.' + cls + '.selected');
    return el ? el.textContent.trim() : '';
  };
  const stars = document.querySelectorAll('.survey-star.active').length;

  const data = {
    type: 'overall_survey',
    item: 'Overall Survey',
    lesson: 'N/A',
    rating: stars + ' stars',
    comments: [
      'Overall: ' + stars + '/5 stars',
      'Topics cover needs: ' + getSelected('survey-opt-topics'),
      'Lesson order: ' + getSelected('survey-opt-order'),
      'Module org: ' + getSelected('survey-opt-modules'),
      'Recommend: ' + getSelected('survey-opt-recommend'),
      'Missing topics: ' + getValue('survey-missing'),
      'Changes: ' + getValue('survey-changes'),
      'Role: ' + getValue('survey-role'),
      'Setting: ' + getValue('survey-setting'),
      'Other: ' + getValue('survey-other')
    ].filter(s => !s.endsWith(': ')).join(' | ')
  };

  sendFeedback(data);

  const success = document.getElementById('survey-success');
  if (success) {
    success.style.display = 'block';
    success.textContent = '✓ Thank you — feedback received. You can resubmit anytime after using the app further.';
  }
}

function toggleSurveyOpt(btn) {
  const cls = Array.from(btn.classList).find(c => c.startsWith('survey-opt-'));

    document.querySelectorAll('.survey-opt-recommend').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');

}
