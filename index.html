<style>
  :root {
    --ink: #1a1410;
    --paper: #f5f0e8;
    --cream: #ede7d6;
    --red: #c0392b;
    --red-light: #f0dedd;
    --gold: #b8860b;
    --gold-light: #f0e6c0;
    --teal: #1a6b6b;
    --teal-light: #d4eaea;
    --muted: #7a6f65;
    --border: #d4c9b8;
    --section-bg: #faf7f2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Serif Display', 'Noto Serif TC', serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* HEADER */
  /* ── COMPACT HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    background: var(--ink);
    color: var(--paper);
    border-bottom: 2px solid var(--gold);
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 200;
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-wordmark {
    font-family: 'DM Serif Display', serif;
    font-size: 1.45rem;
    font-style: italic;
    color: var(--paper);
    letter-spacing: 0.02em;
  }
  .header-sub {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
    opacity: 0.9;
    letter-spacing: 0.05em;
  }
  .header-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--teal), var(--gold));
  }
  
  
  
  /* LAYOUT */
  .app-container {
    display: block;
    min-height: calc(100vh - 108px);
    margin-left: 260px;
    padding-top: 108px;
  }
  /* SIDEBAR */

  /* MAIN */
  main { padding: 36px 44px; max-width: 100%; box-sizing: border-box; }
  #anatomy-container, #setup-container, #pathway-container, #favorites-container { padding-top: 100px; }

  .lesson-header {
    margin-bottom: 12px;
    padding-bottom: 16px;
  }
  .lesson-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .lesson-main-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.6rem, 3.5vw, 2.5rem);
    font-style: italic;
    line-height: 1.1;
  }
  .lesson-main-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(1rem, 2vw, 1.5rem);
    font-weight: 300;
    color: var(--teal);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .main-speak-btn {
    background: none; border: 1px solid var(--teal);
    color: var(--teal); cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.1em;
    padding: 3px 9px; opacity: 0.75;
    transition: all 0.15s;
  }
  .main-speak-btn:hover { opacity: 1; background: var(--teal); color: var(--paper); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border-bottom: 2px solid var(--border);
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 9px 20px;
    border: none;
    background: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); }

  /* SECTION ACCORDION */
  .section-block {
    margin-bottom: 20px;
    border: 1.5px solid var(--border);
    background: var(--section-bg);
  }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .section-header:hover { background: var(--gold-light); }
  .section-header.open { background: var(--ink); color: var(--paper); }
  .section-title-en {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .section-title-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    font-weight: 600;
    margin-left: 10px;
    opacity: 0.8;
  }
  .section-chevron {
    font-size: 0.7rem;
    transition: transform 0.2s;
  }
  .section-header.open .section-chevron { transform: rotate(180deg); }
  .section-body {
    display: none;
    padding: 20px;
    border-top: 1px solid var(--border);
  }
  .section-body.open { display: block; }

  /* VOCAB GRID */
  .vocab-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
    gap: 12px;
  }
  .vocab-card {
    background: white;
    border: 1.5px solid var(--border);
    padding: 12px 12px 8px 12px;
    position: relative;
    transition: all 0.2s;
  }
  .vocab-card:hover {
    border-color: var(--gold);
    box-shadow: 3px 3px 0 var(--gold-light);
    transform: translate(-1px,-1px);
  }
  .vocab-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.6rem;
    padding-right: 36px;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 5px;
  }
  .vocab-jyutping {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--teal);
    margin-bottom: 3px;
    letter-spacing: 0.04em;
  }
  .vocab-en {
    font-family: 'Noto Sans HK', sans-serif;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .audio-btn {
    position: absolute;
    top: 10px; right: 10px;
    width: 26px; height: 26px;
    border: 1.5px solid var(--border);
    background: var(--cream);
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    color: var(--muted);
    transition: all 0.15s;
    padding: 0;
  }
  .audio-btn:hover { background: var(--teal); border-color: var(--teal); color: white; }
  .audio-btn.playing { background: var(--red); border-color: var(--red); color: white; animation: pulse 0.7s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.12)} }

  /* DIALOGUE */
  .dialogue-controls {
    display: flex; gap: 10px; margin-bottom: 20px; align-items: center;
  }
  .play-all-btn {
    display: flex; align-items: center; gap: 7px;
    padding: 9px 18px;
    background: var(--ink); color: var(--paper);
    border: none; cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
    transition: background 0.15s;
  }
  .play-all-btn:hover { background: var(--teal); }
  .play-all-btn.playing { background: var(--red); }
  .stop-btn {
    padding: 9px 18px;
    background: none; color: var(--muted);
    border: 1.5px solid var(--border);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
    transition: all 0.15s;
  }
  .stop-btn:hover { border-color: var(--ink); color: var(--ink); }
  .dialogue-line {
    display: grid;
    grid-template-columns: 72px 1fr;
    gap: 14px;
    align-items: start;
    padding: 14px;
    margin-bottom: 7px;
    border: 1.5px solid transparent;
    transition: all 0.2s;
  }
  .dialogue-line.doctor { background: var(--teal-light); border-color: rgba(26,107,107,0.15); }
  .dialogue-line.patient { background: var(--red-light); border-color: rgba(192,57,43,0.15); }
  .dialogue-line.highlighted { border-color: var(--gold) !important; box-shadow: 0 0 0 2px var(--gold-light); transform: translateX(3px); }
  .speaker-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 7px;
    display: inline-block;
    font-weight: 500;
  }
  .doctor .speaker-tag { background: var(--teal); color: white; }
  .patient .speaker-tag { background: var(--red); color: white; }
  .line-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 3px;
  }
  .line-jyutping {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--teal);
    margin-bottom: 2px;
  }
  .line-en {
    font-family: 'Noto Sans HK', sans-serif;
    font-size: 0.75rem;
    color: var(--muted);
    font-style: italic;
  }

  /* QUIZ */
  .quiz-section { max-width: 620px; }
  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .quiz-score {
    font-family: 'DM Mono', monospace; font-size: 0.7rem;
    padding: 5px 12px; background: var(--gold-light); border: 1px solid var(--gold); color: var(--gold);
  }
  .start-quiz-btn {
    padding: 11px 26px; background: var(--ink); color: var(--paper);
    border: none; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
    transition: background 0.15s;
  }
  .start-quiz-btn:hover { background: var(--teal); }
  .question-card { background: white; border: 1.5px solid var(--border); padding: 26px; margin-bottom: 18px; }
  .question-num { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.15em; margin-bottom: 10px; }
  .question-text { font-family: 'Noto Serif TC', serif; font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
  .question-jyutping { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--teal); margin-bottom: 18px; }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .choice-btn {
    padding: 11px 14px; border: 1.5px solid var(--border); background: var(--cream);
    cursor: pointer; font-family: 'Noto Sans HK', sans-serif; font-size: 0.78rem;
    text-align: left; transition: all 0.15s; color: var(--ink);
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--teal); background: var(--teal-light); }
  .choice-btn.correct { background: #d4edda; border-color: #28a745; color: #155724; }
  .choice-btn.incorrect { background: #f8d7da; border-color: #dc3545; color: #721c24; }
  .quiz-result { text-align: center; padding: 44px 32px; background: white; border: 1.5px solid var(--border); }
  .result-score { font-family: 'DM Serif Display', serif; font-size: 3.8rem; color: var(--gold); line-height: 1; }
  .result-label { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 6px; margin-bottom: 22px; }

  /* HINT BUTTON */
  .hint-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    border: 1.5px dashed var(--gold);
    background: none;
    color: var(--gold);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s;
    margin-top: 12px;
  }
  .hint-btn:hover { background: var(--gold-light); }
  .hint-btn.used { border-style: solid; background: var(--gold-light); color: #7a5f00; cursor: default; }
  .hint-reveal {
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--gold-light);
    border: 1px solid var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: #7a5f00;
    animation: fadeIn 0.2s ease;
  }

  /* Progress */
  .progress-bar { height: 3px; background: var(--border); margin-bottom: 28px; }
  .progress-fill { height: 100%; background: var(--gold); transition: width 0.4s ease; }

  /* ── Search ── */
  .search-result-group { margin-bottom: 14px; }
  .search-result-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.18em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(184,134,11,0.2);
  }
  .search-result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
  }
  .search-vocab-card {
    background: rgba(245,240,232,0.05);
    border: 1px solid rgba(245,240,232,0.1);
    border-radius: 3px;
    padding: 10px 12px 24px;
    position: relative;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .search-vocab-card:hover { border-color: var(--teal); background: rgba(26,107,107,0.1); }
  .search-vocab-card .vocab-zh { font-family: 'Noto Serif TC', serif; font-size: 1.3rem; font-weight: 600; color: var(--paper); margin-bottom: 2px; }
  .search-vocab-card .vocab-jp { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--gold); margin-bottom: 4px; }
  .search-vocab-card .vocab-en { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: rgba(245,240,232,0.7); }
  .search-card-play { position:absolute; top:8px; right:8px; background:none; border:none; cursor:pointer; color:var(--muted); font-size:0.8rem; padding:2px 4px; }
  .search-card-play:hover { color: var(--teal); }
  .search-card-fav { position:absolute; bottom:6px; right:8px; background:none; border:none; cursor:pointer; font-size:1rem; font-weight:900; color:var(--muted); padding:2px 4px; transition: color 0.15s; }
  .search-card-fav:hover { color: var(--gold); }
  .search-card-fav.starred { color: var(--gold); }
  .search-no-results { font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--muted); padding:16px 0; }
  .search-jump-btn {
    font-family: 'DM Mono', monospace; font-size: 0.55rem; letter-spacing: 0.1em;
    background: none; border: 1px solid rgba(245,240,232,0.15); color: var(--muted);
    padding: 3px 8px; cursor: pointer; margin-left: 8px; vertical-align: middle;
    transition: all 0.15s;
  }
  .search-jump-btn:hover { border-color: var(--teal); color: var(--teal); }
  #search-input::placeholder { color: rgba(245,240,232,0.3); }
  .fav-btn {
    margin-left: auto;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 900;
    color: var(--muted);
    padding: 2px 4px;
    line-height: 1;
    transition: color 0.15s, transform 0.15s;
  }
  .fav-btn:hover { color: var(--gold); transform: scale(1.15); }
  .fav-btn.starred { color: var(--gold); }
  .vocab-card { position: relative; }

  /* ── Speed toggle button removed ── */
  .speed-btn-removed {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    padding: 5px 10px;
    background: none;
    border: 1px solid rgba(245,240,232,0.25);
    color: rgba(245,240,232,0.55);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .speed-btn:hover { border-color: var(--teal); color: var(--teal); }
  .speed-btn.slow { border-color: var(--teal); color: var(--teal); background: rgba(32,178,170,0.1); }

  /* ── Fav count badge ── */
  #fav-count-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--ink);
    font-size: 0.5rem;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 8px;
    margin-left: 3px;
    vertical-align: middle;
  }

  /* ── Favorites page ── */
  .fav-lesson-group { margin-bottom: 28px; }
  .fav-lesson-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    border-bottom: 1px solid rgba(184,134,11,0.25);
    padding-bottom: 6px;
    margin-bottom: 14px;
  }
  .fav-empty {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    padding: 60px 20px;
    line-height: 2;
  }
  .vocab-play-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: var(--ink);
    border: 1px solid rgba(245,240,232,0.1);
    flex-wrap: wrap;
  }
  .play-bar-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: rgba(245,240,232,0.75);
    margin-right: 6px;
    white-space: nowrap;
    border-right: 1px solid rgba(245,240,232,0.15);
    padding-right: 12px;
  }
  .vocab-play-bar .play-all-btn {
    flex: 0 0 auto;
    font-size: 0.65rem;
    padding: 7px 14px;
    letter-spacing: 0.06em;
  }
  .drill-btn {
    border-color: var(--gold) !important;
    color: var(--gold) !important;
  }
  .drill-btn:hover { background: var(--gold) !important; color: var(--ink) !important; }
  .drill-btn.playing { background: var(--gold) !important; color: var(--ink) !important; }
  .vocab-play-progress {
    flex: 1;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: rgba(245,240,232,0.55);
    letter-spacing: 0.08em;
  }
  .vocab-play-progress span {
    color: var(--gold);
    font-weight: 500;
  }
  .section-play-btn {
    padding: 4px 12px;
    border: 1.5px solid var(--border);
    background: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    transition: all 0.15s;
    white-space: nowrap;
    margin-left: 8px;
  }
  .section-play-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-light); }
  .section-play-btn.playing { border-color: var(--red); color: var(--red); background: var(--red-light); }

      {zh:"唔多唔少",jp:"m4 do1 m4 siu2",en:"More or less / Somewhat (colloquial)"}]}],dialogue:{title:"Dialogue: How Are You Feeling?",lines:[{sp:"A",zh:"喂，你最近點呀？睇落好似有啲唔開心喎。",jp:"wai3, nei5 zeoi3 gan6 dim2 aa3? tai2 lok6 hou2 ci5 jau5 di1 m4 hoi1 sam1 wo3.",en:"Hey, how have you been lately? You seem a bit down."},{sp:"B",zh:"係囉，我最近壓力好大，份工令我好大壓力，瞓唔著覺。",jp:"hai6 lo3, ngo5 zeoi3 gan6 aat3 lik6 hou2 daai6, go3 gung1 ling6 ngo5 hou2 daai6 aat3 lik6, fan3 m4 zoek6 gaau3.",en:"Yeah, I've been under a lot of pressure lately. Work is really stressing me out and I can't sleep."},{sp:"A",zh:"我明白你嘅感受。你試過同人傾訴冇？",jp:"ngo5 ming4 baak6 nei5 ge3 gam2 sau6. nei5 si3 gwo3 tung4 jan4 king1 sou3 mou5?",en:"I understand how you feel. Have you tried talking to someone about it?"},{sp:"B",zh:"冇乜，我唔係好鍾意講自己嘅嘢。但係今日同你講，感覺舒服啲。",jp:"mou5 mat1, ngo5 m4 hai6 hou2 zung1 ji3 gong2 zi6 gei2 ge3 je5. daan6 hai6 gam1 jat6 tung4 nei5 gong2, gam2 gok3 syu1 fuk6 di1.",en:"Not really, I don't like to talk about my own stuff much. But talking to you today makes me feel a bit better."},{sp:"A",zh:"係咁㗎，有時講出嚟會輕鬆好多。記住，你唔係一個人㗎。",jp:"hai6 gam2 gaa3, jau5 si4 gong2 ceot1 lei4 wui5 hing1 sung1 hou2 do1. gei3 zyu3, nei5 m4 hai6 jat1 go3 jan4 gaa3.",en:"That's true, sometimes saying it out loud makes things much lighter. Remember, you're not alone."}]}},
  {id:2,zh:"政治與時事",en:"Politics & Current Affairs",sections:[{title:"Government & Systems",zh:"政府與制度",vocab:[{zh:"民主",jp:"man4 zyu2",en:"Democracy"},{zh:"獨裁",jp:"duk6 coi4",en:"Dictatorship / Authoritarianism"},{zh:"共產主義",jp:"gung6 caan2 zyu2 ji6",en:"Communism"},{zh:"資本主義",jp:"zi1 bun2 zyu2 ji6",en:"Capitalism"},{zh:"政府",jp:"zing3 fu2",en:"Government"},{zh:"議會",jp:"ji5 wui2",en:"Parliament / Legislature"},{zh:"選舉",jp:"syun2 geoi2",en:"Election"},{zh:"投票",jp:"tau4 piu3",en:"Vote / Voting"},{zh:"政策",jp:"zing3 caak3",en:"Policy"},{zh:"法律",jp:"faat3 leot6",en:"Law"},{zh:"憲法",jp:"hin3 faat3",en:"Constitution"},{zh:"人權",jp:"jan4 kyun4",en:"Human rights"},
      {zh:"大陸",jp:"daai6 luk6",en:"Mainland China (HK colloquial)"},
      {zh:"港府",jp:"gong2 fu2",en:"HK Government (colloquial short form)"}]},{title:"Political Topics",zh:"政治議題",vocab:[{zh:"自由",jp:"zi6 jau4",en:"Freedom / Liberty"},{zh:"平等",jp:"ping4 dang2",en:"Equality"},{zh:"示威",jp:"si6 wai1",en:"Protest / Demonstration"},{zh:"言論自由",jp:"jin4 leon6 zi6 jau4",en:"Freedom of speech"},{zh:"新聞自由",jp:"san1 man4 zi6 jau4",en:"Freedom of the press"},{zh:"腐敗",jp:"fu6 baai6",en:"Corruption"},{zh:"制裁",jp:"zai3 coi4",en:"Sanctions"},{zh:"外交",jp:"ngoi6 gaau1",en:"Diplomacy / Foreign affairs"},{zh:"移民",jp:"ji4 man4",en:"Immigration / Immigrant"},{zh:"難民",jp:"naan6 man4",en:"Refugee"},{zh:"貧富差距",jp:"pan4 fu3 caa1 geoi3",en:"Wealth gap / Inequality"},{zh:"氣候變化",jp:"hei3 hau6 bin3 faa3",en:"Climate change"},
      {zh:"割席",jp:"got3 zik6",en:"Distance oneself / Cut ties (HK political colloquial)"}]},{title:"Current Affairs Phrases",zh:"時事用語",vocab:[{zh:"你點睇呢件事？",jp:"nei5 dim2 tai2 ni1 gin6 si6?",en:"What do you think about this matter?"},{zh:"我支持／反對",jp:"ngo5 zi1 ci4 / faan2 deoi3",en:"I support / I oppose"},{zh:"呢個情況好複雜",jp:"ni1 go3 cing4 fong3 hou2 fuk6 zaap6",en:"The situation is very complicated"},{zh:"根據新聞報導",jp:"gan1 geoi3 san1 man4 bou3 dou6",en:"According to news reports"},{zh:"兩黨之間嘅爭議",jp:"loeng5 dong2 zi1 gaan1 ge3 zang1 ji3",en:"Dispute between the two parties"},{zh:"政治立場",jp:"zing3 zi6 laap6 coeng4",en:"Political stance"},{zh:"左派／右派",jp:"zo2 paai3 / jau6 paai3",en:"Left-wing / Right-wing"},
      {zh:"唔講政治",jp:"m4 gong2 zing3 zi6",en:"I don't talk politics (common deflection, colloquial)"}]}],dialogue:{title:"Dialogue: Talking Politics",lines:[{sp:"A",zh:"你有冇睇今日嘅新聞？政府又出咗新政策喇。",jp:"nei5 jau5 mou5 tai2 gam1 jat6 ge3 san1 man4? zing3 fu2 jau6 ceot1 zo2 san1 zing3 caak3 laa3.",en:"Did you see today's news? The government has announced a new policy again."},{sp:"B",zh:"睇咗，我唔係好支持呢個政策，覺得對普通市民唔公平。",jp:"tai2 zo2, ngo5 m4 hai6 hou2 zi1 ci4 ni1 go3 zing3 caak3, gok3 dak1 deoi3 pou2 tung1 si5 man4 m4 gung1 ping4.",en:"I saw it. I don't really support this policy — I think it's unfair to ordinary citizens."},{sp:"A",zh:"我明白你嘅擔憂，但係我覺得佢哋係想解決貧富差距嘅問題。",jp:"ngo5 ming4 baak6 nei5 ge3 daam1 jau1, daan6 hai6 ngo5 gok3 dak1 keoi5 dei6 hai6 soeng2 gaai2 kyut3 pan4 fu3 caa1 geoi3 ge3 man6 tai4.",en:"I understand your concern, but I think they're trying to address the wealth gap."},{sp:"B",zh:"係，但係執行嘅方式有問題。言論自由同新聞自由都要保護。",jp:"hai6, daan6 hai6 zap1 hang4 ge3 fong1 sik1 jau5 man6 tai4. jin4 leon6 zi6 jau4 tung4 san1 man4 zi6 jau4 dou1 jiu3 bou2 wu6.",en:"Yes, but the way it's being implemented is problematic. Freedom of speech and the press both need to be protected."},{sp:"A",zh:"你講得啱。呢個係一個好複雜嘅議題，唔係三言兩語可以講清楚㗎。",jp:"nei5 gong2 dak1 ngaam1. ni1 go3 hai6 jat1 go3 hou2 fuk6 zaap6 ge3 ji5 tai4, m4 hai6 saam1 jin4 loeng5 jyu5 ho2 yi5 gong2 cing1 co2 gaa3.",en:"You make a good point. This is a very complicated issue — it can't be explained in just a few words."}]}},
  {id:3,zh:"財務、銀行與投資",en:"Finance, Banking & Investing",sections:[{title:"Banking Basics",zh:"銀行基本",vocab:[{zh:"銀行",jp:"ngan4 hong4",en:"Bank"},{zh:"戶口",jp:"wu6 hau2",en:"Bank account"},{zh:"存款",jp:"cyun4 fun2",en:"Deposit / Savings"},{zh:"提款",jp:"tai4 fun2",en:"Withdrawal"},{zh:"轉帳",jp:"zyun2 zoeng3",en:"Transfer (money)"},{zh:"利息",jp:"lei6 sik1",en:"Interest"},{zh:"貸款",jp:"daai3 fun2",en:"Loan"},{zh:"按揭",jp:"on3 kit3",en:"Mortgage"},{zh:"信用卡",jp:"seon3 jung6 kaat1",en:"Credit card"},{zh:"債務",jp:"zaai3 mou6",en:"Debt"},{zh:"預算",jp:"jyu6 syun3",en:"Budget"},{zh:"稅",jp:"seoi3",en:"Tax"},
      {zh:"找數",jp:"zaau2 sou3",en:"Settle a debt / Pay up (colloquial)"},
      {zh:"夾錢",jp:"gaap3 cin2",en:"Split / Pool money (colloquial)"},
      {zh:"AA制",jp:"AA zai3",en:"Go Dutch / Split equally (colloquial)"}]},{title:"Investing & Markets",zh:"投資與市場",vocab:[{zh:"股票",jp:"gu2 piu3",en:"Stock / Share"},{zh:"股市",jp:"gu2 si5",en:"Stock market"},{zh:"基金",jp:"gei1 gam1",en:"Fund / Mutual fund"},{zh:"債券",jp:"zaai3 gyun3",en:"Bond"},{zh:"加密貨幣",jp:"gaa1 mat6 fo3 bai6",en:"Cryptocurrency"},{zh:"升值",jp:"sing1 zik6",en:"Appreciate / Go up in value"},{zh:"貶值",jp:"bin2 zik6",en:"Depreciate / Lose value"},{zh:"風險",jp:"fung1 him2",en:"Risk"},{zh:"回報",jp:"wui4 bou3",en:"Return / Yield"},{zh:"分散投資",jp:"fan1 saan3 tau4 zi1",en:"Diversify investments"},{zh:"通貨膨脹",jp:"tung1 fo3 paang4 zoeng3",en:"Inflation"},{zh:"衰退",jp:"seoi1 teoi3",en:"Recession"},
      {zh:"炒股",jp:"caau2 gu2",en:"Play the stock market (colloquial)"},
      {zh:"蟹貨",jp:"haai5 fo3",en:"Holding a loss position (colloquial — lit. crab goods)"}]},{title:"Financial Phrases",zh:"財務用語",vocab:[{zh:"我想開個戶口",jp:"ngo5 soeng2 hoi1 go3 wu6 hau2",en:"I'd like to open an account"},{zh:"而家利率係幾多？",jp:"ji4 gaa1 lei6 leot6 hai6 gei2 do1?",en:"What's the current interest rate?"},{zh:"長線投資定短線炒賣？",jp:"coeng4 sin3 tau4 zi1 ding6 dyun2 sin3 caau2 maai6?",en:"Long-term investing or short-term trading?"},{zh:"你有冇買股票？",jp:"nei5 jau5 mou5 maai5 gu2 piu3?",en:"Do you invest in stocks?"},{zh:"我唔想冒太大風險",jp:"ngo5 m4 soeng2 mou6 taai3 daai6 fung1 him2",en:"I don't want to take too much risk"},{zh:"應該點樣分配資產？",jp:"jing1 goi1 dim2 joeng2 fan1 pui3 zi1 caan2?",en:"How should I allocate my assets?"},
      {zh:"慳得就慳",jp:"haan1 dak1 zau6 haan1",en:"Save wherever you can (colloquial)"}]}],dialogue:{title:"Dialogue: Talking About Investments",lines:[{sp:"A",zh:"你最近有冇留意股市呀？跌咗好多喎。",jp:"nei5 zeoi3 gan6 jau5 mou5 lau4 ji3 gu2 si5 aa3? dit3 zo2 hou2 do1 wo3.",en:"Have you been watching the stock market lately? It's dropped a lot."},{sp:"B",zh:"係呀，通貨膨脹同加息令股市好波動。我而家唔敢亂買。",jp:"hai6 aa3, tung1 fo3 paang4 zoeng3 tung4 gaa1 sik1 ling6 gu2 si5 hou2 bo1 dung6. ngo5 ji4 gaa1 m4 gam2 lyun6 maai5.",en:"Yeah, inflation and rate hikes are making the market very volatile. I don't dare buy randomly now."},{sp:"A",zh:"我係長線投資嗰種，唔理短期升跌。買咗指數基金就算。",jp:"ngo5 hai6 coeng4 sin3 tau4 zi1 go2 zung2, m4 lei5 dyun2 kei4 sing1 dit3. maai5 zo2 zi2 sou3 gei1 gam1 zau6 syun3.",en:"I'm a long-term investor — I don't worry about short-term ups and downs. I just buy index funds."},{sp:"B",zh:"聽落好穩陣，但係我覺得分散投資好重要。唔可以將所有雞蛋放係同一個籃。",jp:"ting1 lok6 hou2 wan2 zan6, daan6 hai6 ngo5 gok3 dak1 fan1 saan3 tau4 zi1 hou2 zung6 jiu3. m4 ho2 ji5 zoeng1 so2 jau5 gai1 daan6 fong3 hai6 tung4 jat1 go3 laam2.",en:"That sounds stable, but I still think diversification is important. You can't put all your eggs in one basket."},{sp:"A",zh:"你講得好啱。我都有買一啲債券同加密貨幣作為對沖。",jp:"nei5 gong2 dak1 hou2 ngaam1. ngo5 dou1 jau5 maai5 jat1 di1 zaai3 gyun3 tung4 gaa1 mat6 fo3 bai6 zok3 wai4 deoi3 cung1.",en:"You're absolutely right. I also hold some bonds and crypto as a hedge."}]}},
  {id:4,zh:"工作與職業",en:"Work & Career",sections:[{title:"Workplace Vocabulary",zh:"職場詞彙",vocab:[{zh:"老闆",jp:"lou5 baan2",en:"Boss / Employer"},{zh:"同事",jp:"tung4 si6",en:"Colleague"},{zh:"下屬",jp:"haa6 suk6",en:"Subordinate"},{zh:"升職",jp:"sing1 zik1",en:"Promotion"},{zh:"加薪",jp:"gaa1 san1",en:"Pay raise"},{zh:"炒魷魚",jp:"caau2 jau4 jyu2",en:"Get fired"},{zh:"辭職",jp:"ci4 zik1",en:"Resign"},{zh:"面試",jp:"min6 si3",en:"Job interview"},{zh:"履歷",jp:"leoi5 lik6",en:"Resume / CV"},{zh:"合約",jp:"hap6 joek3",en:"Contract"},{zh:"加班",jp:"gaa1 baan1",en:"Overtime"},{zh:"在家工作",jp:"zoi6 gaa1 gung1 zok3",en:"Work from home"},
      {zh:"OT",jp:"ou1 ti1",en:"Overtime (HK colloquial)"},
      {zh:"摸魚",jp:"mo2 jyu4",en:"Slack off at work (colloquial — lit. grope for fish)"},
      {zh:"打工仔",jp:"daa2 gung1 zai2",en:"Salaried worker (colloquial, slightly self-deprecating)"}]},{title:"Career & Profession",zh:"職業",vocab:[{zh:"醫生",jp:"ji1 saang1",en:"Doctor"},{zh:"律師",jp:"leot6 si1",en:"Lawyer"},{zh:"工程師",jp:"gung1 cing4 si1",en:"Engineer"},{zh:"教師",jp:"gaau3 si1",en:"Teacher"},{zh:"會計師",jp:"wui2 gai3 si1",en:"Accountant"},{zh:"商人",jp:"soeng1 jan4",en:"Businessman"},{zh:"護士",jp:"wu6 si6",en:"Nurse"},{zh:"廚師",jp:"cyu4 si1",en:"Chef"},{zh:"記者",jp:"gei3 ze2",en:"Journalist"},{zh:"自僱人士",jp:"zi6 gu3 jan4 si6",en:"Self-employed"},{zh:"公務員",jp:"gung1 mou6 jyun4",en:"Civil servant"},{zh:"退休",jp:"teoi3 jau1",en:"Retirement / Retired"}]},{title:"Work-Life Phrases",zh:"工作生活用語",vocab:[{zh:"你做咩工作㗎？",jp:"nei5 zou6 me1 gung1 zok3 gaa3?",en:"What do you do for work?"},{zh:"你鍾唔鍾意你份工？",jp:"nei5 zung1 m4 zung1 ji3 nei5 fan6 gung1?",en:"Do you like your job?"},{zh:"份工好有壓力",jp:"fan6 gung1 hou2 jau5 aat3 lik6",en:"The job is very stressful"},{zh:"我想轉工",jp:"ngo5 soeng2 zyun2 gung1",en:"I want to change jobs"},{zh:"工作同生活要平衡",jp:"gung1 zok3 tung4 sang1 wut6 jiu3 ping4 hang4",en:"Work-life balance is important"},{zh:"你有冇考慮過創業？",jp:"nei5 jau5 mou5 haau2 leoi6 gwo3 cong3 jip6?",en:"Have you ever considered starting your own business?"},
      {zh:"返工",jp:"faan1 gung1",en:"Go to work (colloquial)"},
      {zh:"放工",jp:"fong3 gung1",en:"Finish work / Clock off (colloquial)"},
      {zh:"頂硬上",jp:"ding2 ngaang6 soeng5",en:"Push through / Grit and do it (colloquial)"}]}],dialogue:{title:"Dialogue: Career Change",lines:[{sp:"A",zh:"你最近話想轉工，係咪真㗎？",jp:"nei5 zeoi3 gan6 waa6 soeng2 zyun2 gung1, hai6 mai6 zan1 gaa3?",en:"You mentioned recently that you want to change jobs — is that true?"},{sp:"B",zh:"係呀，我做咗呢份工五年，一直冇升職，而且加班嘅情況愈嚟愈嚴重。",jp:"hai6 aa3, ngo5 zou6 zo2 ni1 fan6 gung1 ng5 nin4, jat1 zik6 mou5 sing1 zik1, ji4 ce2 gaa1 baan1 ge3 cing4 fong3 jyu6 lei4 jyu6 jim4 zung6.",en:"Yeah, I've been in this job for five years, never got promoted, and the overtime is getting worse and worse."},{sp:"A",zh:"我明白，工作同生活嘅平衡好重要。你有冇考慮過自己創業？",jp:"ngo5 ming4 baak6, gung1 zok3 tung4 sang1 wut6 ge3 ping4 hang4 hou2 zung6 jiu3. nei5 jau5 mou5 haau2 leoi6 gwo3 zi6 gei2 cong3 jip6?",en:"I understand — work-life balance is very important. Have you considered starting your own business?"},{sp:"B",zh:"諗過，但係風險好大。而家經濟唔係好好，我唔敢冒險。",jp:"nam2 gwo3, daan6 hai6 fung1 him2 hou2 daai6. ji4 gaa1 ging1 zai3 m4 hai6 hou2 hou2, ngo5 m4 gam2 mou6 him2.",en:"I've thought about it, but the risk is high. The economy isn't great right now — I don't dare to take the risk."},{sp:"A",zh:"明白。咁你可以先整靚份履歷，試吓去面試，睇吓有冇更好嘅機會。",jp:"ming4 baak6. gam2 nei5 ho2 yi5 sin1 zing2 leng3 fan6 leoi5 lik6, si3 haa5 heoi3 min6 si3, tai2 haa5 jau5 mou5 gang3 hou2 ge3 gei1 wui6.",en:"I understand. Then you could start by polishing your resume, try some interviews, and see if better opportunities come up."}]}},
  {id:5,zh:"旅遊與交通",en:"Travel & Transportation",sections:[{title:"Transportation",zh:"交通",vocab:[{zh:"飛機",jp:"fei1 gei1",en:"Airplane"},{zh:"火車",jp:"fo2 ce1",en:"Train"},{zh:"地鐵",jp:"dei6 tit3",en:"Subway / MTR"},{zh:"巴士",jp:"baa1 si2",en:"Bus"},{zh:"的士",jp:"dik1 si2",en:"Taxi"},{zh:"渡輪",jp:"dou6 leon4",en:"Ferry"},{zh:"機場",jp:"gei1 coeng4",en:"Airport"},{zh:"車站",jp:"ce1 zaam6",en:"Train / Bus station"},{zh:"月台",jp:"jyut6 toi4",en:"Platform"},{zh:"行李",jp:"hang4 lei5",en:"Luggage / Baggage"},{zh:"護照",jp:"wu6 ziu3",en:"Passport"},{zh:"簽證",jp:"cim1 zing3",en:"Visa"},
      {zh:"搭車",jp:"daap3 ce1",en:"Take transport (colloquial)"},
      {zh:"截的士",jp:"zit6 dik1 si2",en:"Hail a taxi (colloquial)"}]},{title:"Travel Experiences",zh:"旅遊體驗",vocab:[{zh:"酒店",jp:"zau2 dim3",en:"Hotel"},{zh:"民宿",jp:"man4 suk1",en:"Guesthouse / Airbnb"},{zh:"景點",jp:"ging2 dim2",en:"Tourist attraction"},{zh:"博物館",jp:"bok3 mat6 gun2",en:"Museum"},{zh:"海灘",jp:"hoi2 taan1",en:"Beach"},{zh:"文化差異",jp:"man4 faa3 caa1 ji6",en:"Cultural difference"},{zh:"時差",jp:"si4 caa1",en:"Jet lag / Time difference"},{zh:"換錢",jp:"wun6 cin2",en:"Currency exchange"},{zh:"旅遊保險",jp:"leoi5 jau4 bou2 him2",en:"Travel insurance"},{zh:"迷路",jp:"mai4 lou6",en:"Get lost"}]},{title:"Travel Phrases",zh:"旅遊用語",vocab:[{zh:"去邊度好？",jp:"heoi3 bin1 dou6 hou2?",en:"Where's a good place to go?"},{zh:"下一班車係幾時？",jp:"haa6 jat1 baan1 ce1 hai6 gei2 si4?",en:"When is the next bus/train?"},{zh:"我想訂一個房間",jp:"ngo5 soeng2 deng6 jat1 go3 fong4 gaan1",en:"I'd like to book a room"},{zh:"附近有冇好食嘅地方？",jp:"fu6 gan6 jau5 mou5 hou2 sik6 ge3 dei6 fong1?",en:"Are there any good places to eat nearby?"},{zh:"我迷路喇，可唔可以幫我？",jp:"ngo5 mai4 lou6 laa3, ho2 m4 ho2 yi5 bong1 ngo5?",en:"I'm lost — can you help me?"},
      {zh:"排長龍",jp:"paai4 coeng4 lung4",en:"Queue in a long line (colloquial)"},
      {zh:"爆棚",jp:"baau3 pang4",en:"Jam-packed (colloquial — lit. burst the shed)"}]}],dialogue:{title:"Dialogue: Planning a Trip",lines:[{sp:"A",zh:"你暑假有冇計劃去旅行？",jp:"nei5 syu2 gaa3 jau5 mou5 gai3 waak6 heoi3 leoi5 hang4?",en:"Do you have any travel plans for the summer?"},{sp:"B",zh:"有呀！我計劃去日本，去京都同大阪。你呢？",jp:"jau5 aa3! ngo5 gai3 waak6 heoi3 jat6 bun2, heoi3 ging1 dou1 tung4 daai6 baan2. nei5 ne1?",en:"Yes! I'm planning to go to Japan — Kyoto and Osaka. What about you?"},{sp:"A",zh:"我想去歐洲，但係機票好貴，仲要申請簽證，好麻煩。",jp:"ngo5 soeng2 heoi3 au1 zau1, daan6 hai6 gei1 piu3 hou2 gwai3, zung6 jiu3 san1 cing2 cim1 zing3, hou2 maa4 faan4.",en:"I want to go to Europe, but flights are expensive and I still need to apply for a visa — such a hassle."},{sp:"B",zh:"係囉，簽證好煩。日本就唔使簽證，方便好多。記得買旅遊保險㗎，好重要㗎。",jp:"hai6 lo3, cim1 zing3 hou2 faan4. jat6 bun2 zau6 m4 sai2 cim1 zing3, fong1 bin6 hou2 do1. gei3 dak1 maai5 leoi5 jau4 bou2 him2 gaa3, hou2 zung6 jiu3 gaa3.",en:"Yeah, visas are a pain. Japan doesn't require one — much more convenient. Remember to buy travel insurance, it's really important."},{sp:"A",zh:"好，我會記住。希望你玩得開心，帶埋手信返嚟㗎！",jp:"hou2, ngo5 wui5 gei3 zyu3. hei1 mong6 nei5 waan2 dak1 hoi1 sam1, daai3 maai4 sau2 seon3 faan1 lei4 gaa3!",en:"Okay, I'll remember. I hope you have a great time — bring back some souvenirs!"}]}},
  {id:6,zh:"教育與學校",en:"Education & School",sections:[{title:"School & Study",zh:"學校與學習",vocab:[{zh:"小學",jp:"siu2 hok6",en:"Primary school"},{zh:"中學",jp:"zung1 hok6",en:"Secondary school"},{zh:"大學",jp:"daai6 hok6",en:"University"},{zh:"研究院",jp:"jin4 gau3 jyun2",en:"Graduate school"},{zh:"學費",jp:"hok6 fai3",en:"Tuition fee"},{zh:"獎學金",jp:"zoeng2 hok6 gam1",en:"Scholarship"},{zh:"考試",jp:"haau2 si3",en:"Exam"},{zh:"功課",jp:"gung1 fo3",en:"Homework"},{zh:"成績",jp:"sing4 zik1",en:"Grades / Results"},{zh:"畢業",jp:"bat1 jip6",en:"Graduate / Graduation"},{zh:"學位",jp:"hok6 wai6",en:"Degree"},{zh:"課程",jp:"fo3 cing4",en:"Curriculum / Course"},

      {zh:"死記硬背",jp:"sei2 gei3 ngaang6 bui3",en:"Rote memorisation (colloquial)"}]},{title:"Learning & Knowledge",zh:"學習與知識",vocab:[{zh:"努力",jp:"nou5 lik6",en:"Work hard / Diligence"},{zh:"理解",jp:"lei5 gaai2",en:"Understand / Comprehend"},{zh:"批判性思維",jp:"pai1 pun3 sing3 si1 wai4",en:"Critical thinking"},{zh:"創意",jp:"cong3 ji3",en:"Creativity"},{zh:"自學",jp:"zi6 hok6",en:"Self-study"},{zh:"終身學習",jp:"zung1 san1 hok6 zaap6",en:"Lifelong learning"},{zh:"語言學習",jp:"jyu5 jin4 hok6 zaap6",en:"Language learning"},{zh:"技能",jp:"gei6 nang4",en:"Skill"},{zh:"知識",jp:"zi1 sik1",en:"Knowledge"},{zh:"競爭",jp:"ging6 zang1",en:"Competition"}]},{title:"Education Phrases",zh:"教育用語",vocab:[{zh:"你讀乜嘢科？",jp:"nei5 duk6 mat1 je5 fo1?",en:"What are you studying?"},{zh:"而家讀書競爭好激烈",jp:"ji4 gaa1 duk6 syu1 ging6 zang1 hou2 gik1 lit6",en:"Academic competition is very intense nowadays"},{zh:"我希望可以出國留學",jp:"ngo5 hei1 mong6 ho2 yi5 ceot1 gwok3 lau4 hok6",en:"I hope to study abroad"},{zh:"學歷係咪一定重要？",jp:"hok6 lik6 hai6 mai6 jat1 ding6 zung6 jiu3?",en:"Is academic qualification necessarily important?"},{zh:"實踐係最好嘅學習方式",jp:"sat6 cin3 hai6 zeoi3 hou2 ge3 hok6 zaap6 fong1 sik1",en:"Hands-on practice is the best way to learn"},
      {zh:"補習",jp:"bou2 zaap6",en:"Tutoring / Cram school (common HK colloquial)"},
      {zh:"讀唔入腦",jp:"duk6 m4 jap6 nou5",en:"Can't absorb the material (colloquial)"}]}],dialogue:{title:"Dialogue: Studying Abroad",lines:[{sp:"A",zh:"你個仔話想出國留學，你點睇？",jp:"nei5 go3 zai2 waa6 soeng2 ceot1 gwok3 lau4 hok6, nei5 dim2 tai2?",en:"Your son mentioned he wants to study abroad. What do you think?"},{sp:"B",zh:"我支持㗎，但係學費真係好貴。美國同英國嘅學費貴到嚇人。",jp:"ngo5 zi1 ci4 gaa3, daan6 hai6 hok6 fai3 zan1 hai6 hou2 gwai3. mei5 gwok3 tung4 jing1 gwok3 ge3 hok6 fai3 gwai3 dou3 haat3 jan4.",en:"I support it, but the tuition is really expensive. American and British university fees are frighteningly high."},{sp:"A",zh:"係，但係外國嘅學習環境同批判性思維嘅培養，真係有好大分別。",jp:"hai6, daan6 hai6 ngoi6 gwok3 ge3 hok6 zaap6 waan4 ging2 tung4 pai1 pun3 sing3 si1 wai4 ge3 pui4 joeng5, zan1 hai6 jau5 hou2 daai6 fan1 bit6.",en:"Yes, but the learning environment and how they cultivate critical thinking abroad is genuinely very different."},{sp:"B",zh:"你講得啱。而且而家競爭咁激烈，有海外學歷都係一個優勢。",jp:"nei5 gong2 dak1 ngaam1. ji4 ce2 ji4 gaa1 ging6 zang1 gam3 gik1 lit6, jau5 hoi2 ngoi6 hok6 lik6 dou1 hai6 jat1 go3 jau1 sai3.",en:"You're right. And with competition so fierce nowadays, having an overseas degree is an advantage."},{sp:"A",zh:"佢可以申請獎學金㗎，唔係一定要自己付晒所有學費㗎。",jp:"keoi5 ho2 yi5 san1 cing2 zoeng2 hok6 gam1 gaa3, m4 hai6 jat1 ding6 jiu3 zi6 gei2 fu6 saai3 so2 jau5 hok6 fai3 gaa3.",en:"He can apply for scholarships — he doesn't necessarily have to pay for all the tuition himself."}]}},

      {zh:"食死貓",jp:"sik6 sei2 maau1",en:"Take the blame unfairly (colloquial)"},
      {zh:"唔認數",jp:"m4 jing6 sou3",en:"Deny / Refuse to admit (colloquial)"}]}],dialogue:{title:"Dialogue: Legal Dispute",lines:[{sp:"A",zh:"我而家有個好大嘅麻煩，個房東唔肯還我按金，話我損壞咗佢嘅傢俬。",jp:"ngo5 ji4 gaa1 jau5 go3 hou2 daai6 ge3 maa4 faan4, go3 fong4 dung1 m4 hang2 waan4 ngo5 on3 gam1, waa6 ngo5 syun2 waai6 zo2 keoi5 ge3 gaa1 si1.",en:"I have a big problem. My landlord refuses to return my deposit, saying I damaged his furniture."},{sp:"B",zh:"咁你有冇喺搬走之前影相留底？",jp:"gam2 nei5 jau5 mou5 hai2 bun1 jau2 zi1 cin4 jing2 zoeng2 lau4 dai2?",en:"Did you take photos before moving out?"},{sp:"A",zh:"有㗎，全部都影咗，係清楚嘅。我覺得佢係屈我㗎。",jp:"jau5 gaa3, cyun4 bou6 dou1 jing2 zo2, hai6 cing1 co2 ge3. ngo5 gok3 dak1 keoi5 hai6 wat1 ngo5 gaa3.",en:"Yes, I photographed everything clearly. I feel like he's falsely accusing me."},{sp:"B",zh:"咁你要認真考慮搵律師，或者去消費者委員會投訴。呢件事係涉及你嘅合法權益。",jp:"gam2 nei5 jiu3 jan6 zan1 haau2 leoi6 wan2 leot6 si1, waak6 ze2 heoi3 siu1 fai3 ze2 wai2 jyun4 wui2 tau4 sou3. ni1 gin6 si6 hai6 sip3 kap6 nei5 ge3 hap6 faat3 kyun4 jik1.",en:"Then you should seriously consider finding a lawyer, or filing a complaint with the consumer council. This involves your legal rights."},{sp:"A",zh:"你係啱㗎。我唔可以就咁算數，要維護自己嘅權利。",jp:"nei5 hai6 ngaam1 gaa3. ngo5 m4 ho2 yi5 zau6 gam2 syun3 sou3, jiu3 wai4 wu6 zi6 gei2 ge3 kyun4 lei6.",en:"You're right. I can't just let it go — I need to protect my own rights."}]}},

      {zh:"好墟冚",jp:"hou2 heoi1 ham3",en:"Really bustling / chaotic (colloquial)"},
      {zh:"掃街",jp:"sou3 gaai1",en:"Eat your way down the street (colloquial foodie term)"}]}],dialogue:{title:"Dialogue: Where Are You From?",lines:[{sp:"A",zh:"你係邊度人㗎？口音聽落唔像本地人。",jp:"nei5 hai6 bin1 dou6 jan4 gaa3? hau2 jam1 ting1 lok6 m4 zoeng6 bun2 dei6 jan4.",en:"Where are you from? Your accent doesn't sound local."},{sp:"B",zh:"我係廣州人，嚟咗香港住咗差唔多十年喇。",jp:"ngo5 hai6 gwong2 zau1 jan4, lei4 zo2 hoeng1 gong2 zyu6 zo2 caa1 m4 do1 sap6 nin4 laa3.",en:"I'm from Guangzhou. I've been living in Hong Kong for nearly ten years now."},{sp:"A",zh:"哇，咁你一定好熟悉兩個城市喇。你覺得邊度好住啲？",jp:"waa3, gam2 nei5 jat1 ding6 hou2 suk6 sik1 loeng5 go3 sing4 si5 laa3. nei5 gok3 dak1 bin1 dou6 hou2 zyu6 di1?",en:"Wow, you must know both cities well. Which do you think is better to live in?"},{sp:"B",zh:"各有優點㗎，廣州生活費平啲，但係香港係國際城市，機會多好多，文化亦都多元。",jp:"gok3 jau5 jau1 dim2 gaa3, gwong2 zau1 sang1 wut6 fai3 ping4 di1, daan6 hai6 hoeng1 gong2 hai6 gwok3 zai3 sing4 si5, gei1 wui6 do1 hou2 do1, man4 faa3 jik6 dou1 do1 jyun4.",en:"Both have their merits. Guangzhou is cheaper, but Hong Kong is an international city with far more opportunities and cultural diversity."},{sp:"A",zh:"係咁㗎，香港嘅地理位置都幾好，係亞洲嘅中心點嚟㗎。",jp:"hai6 gam2 gaa3, hoeng1 gong2 ge3 dei6 lei5 wai6 zi3 dou1 gei2 hou2, hai6 aa3 zau1 ge3 zung1 sam1 dim2 lei4 gaa3.",en:"That's true — Hong Kong's geographical location is great, right at the center of Asia."}]}},

      {zh:"唔夠喉",jp:"m4 gau3 hau4",en:"Not enough / Still hungry (colloquial)"}]}],dialogue:{title:"Dialogue: Dinner Plans",lines:[{sp:"A",zh:"今晚食乜好？我肚餓喇。",jp:"gam1 maan5 sik6 mat1 hou2? ngo5 tou5 ngo6 laa3.",en:"What should we eat tonight? I'm hungry."},{sp:"B",zh:"我想食粵菜，好耐冇去飲茶喇。不如去旺角果間茶樓？",jp:"ngo5 soeng2 sik6 jyut6 coi3, hou2 noi6 mou5 heoi3 jam2 caa4 laa3. bat1 jyu4 heoi3 wong6 gok3 go2 gaan1 caa4 lau4?",en:"I want Cantonese food — it's been ages since we had dim sum. How about the tea house in Mong Kok?"},{sp:"A",zh:"好呀！但係我有個朋友唔食肉，要有素食選擇㗎。",jp:"hou2 aa3! daan6 hai6 ngo5 jau5 go3 pang4 jau5 m4 sik6 juk6, jiu3 jau5 sou3 sik6 syun2 zaak3 gaa3.",en:"Sure! But one of my friends doesn't eat meat, so there need to be vegetarian options."},{sp:"B",zh:"果間茶樓有好多素食點心㗎，唔使擔心。你記得預訂座位喎，週末好多人㗎。",jp:"go2 gaan1 caa4 lau4 jau5 hou2 do1 sou3 sik6 dim2 sam1 gaa3, m4 sai2 daam1 sam1. nei5 gei3 dak1 jyu6 deng6 zo6 wai2 wo3, zau1 maat3 hou2 do1 jan4 gaa3.",en:"That tea house has lots of vegetarian dim sum — no worries. Remember to make a reservation, it gets very crowded on weekends."},{sp:"A",zh:"好，我而家就打電話去訂位。你有冇嘢唔食㗎？",jp:"hou2, ngo5 ji4 gaa1 zau6 daa2 din6 waa2 heoi3 deng6 wai2. nei5 jau5 mou5 je5 m4 sik6 gaa3?",en:"Okay, I'll call now to make a reservation. Is there anything you don't eat?"}]}},

      {zh:"帖文",jp:"tip3 man4",en:"Post / Thread (HK social media colloquial)"}]},{title:"Tech Phrases",zh:"科技用語",vocab:[{zh:"你用咩社交媒體？",jp:"nei5 jung6 me1 se5 gaau1 mui4 tai2?",en:"What social media do you use?"},{zh:"呢個資訊係假新聞",jp:"ni1 go3 zi1 seon3 hai6 gaa2 san1 man4",en:"This information is fake news"},{zh:"人工智能會唔會取代人類？",jp:"jan4 gung1 zi3 nang4 wui5 m4 wui5 ceoi2 doi6 jan4 leoi6?",en:"Will AI replace humans?"},{zh:"網絡安全好重要",jp:"mong5 lok3 on1 cyun4 hou2 zung6 jiu3",en:"Cybersecurity is very important"},{zh:"唔好輕易相信網上嘅資訊",jp:"m4 hou2 hing1 ji6 soeng1 seon3 mong5 soeng6 ge3 zi1 seon3",en:"Don't easily trust information online"}]}],dialogue:{title:"Dialogue: AI and the Future",lines:[{sp:"A",zh:"你點睇人工智能嘅發展？係咪真係會取代好多工作？",jp:"nei5 dim2 tai2 jan4 gung1 zi3 nang4 ge3 faat3 jin2? hai6 mai6 zan1 hai6 wui5 ceoi2 doi6 hou2 do1 gung1 zok3?",en:"What do you think about the development of AI? Will it really replace many jobs?"},{sp:"B",zh:"我覺得係，特別係重複性嘅工作，好快會被AI取代。但係創意同情感類嘅工作，暫時仲係人類嘅強項。",jp:"ngo5 gok3 dak1 hai6, dak6 bit6 hai6 cung4 fuk6 sing3 ge3 gung1 zok3, hou2 faai3 wui5 bei6 AI ceoi2 doi6. daan6 hai6 cong3 ji3 tung4 cing4 gam2 leoi6 ge3 gung1 zok3, zaam6 si4 zung6 hai6 jan4 leoi6 ge3 koeng4 hoeng6.",en:"I think so — especially repetitive work, which will be replaced by AI very soon. But creative and emotional work is still humanity's strength for now."},{sp:"A",zh:"咁我哋係咪要盡快學習新技能，先可以跟得上？",jp:"gam2 ngo5 dei6 hai6 mai6 jiu3 zeon6 faai3 hok6 zaap6 san1 gei6 nang4, sin1 ho2 yi5 gan1 dak1 soeng5?",en:"So do we need to quickly learn new skills to keep up?"},{sp:"B",zh:"係，終身學習係必須嘅。仲有，要學識點樣同AI合作，而唔係抗拒佢。",jp:"hai6, zung1 san1 hok6 zaap6 hai6 bit1 seoi1 ge3. zung6 jau5, jiu3 hok6 sik1 dim2 joeng2 tung4 AI hap6 zok3, ji4 m4 hai6 kong3 keoi5 keoi5.",en:"Yes, lifelong learning is essential. Also, we need to learn how to collaborate with AI rather than resist it."}]}},
  {id:11,zh:"家庭與人際關係",en:"Family & Relationships",sections:[{title:"Family Members",zh:"家庭成員",vocab:[{zh:"祖父母",jp:"zou2 fu6 mou5",en:"Grandparents"},{zh:"父母",jp:"fu6 mou5",en:"Parents"},{zh:"兄弟姊妹",jp:"hing1 dai6 zi2 mui6",en:"Siblings"},{zh:"配偶",jp:"pui3 ngau5",en:"Spouse"},{zh:"子女",jp:"zi2 neoi5",en:"Children"},{zh:"親戚",jp:"can1 cik1",en:"Relatives"},{zh:"姻親",jp:"jan1 can1",en:"In-laws"},{zh:"單親家庭",jp:"daan1 can1 gaa1 ting4",en:"Single-parent family"},{zh:"大家庭",jp:"daai6 gaa1 ting4",en:"Extended family"},{zh:"隔代教養",jp:"gaak3 doi6 gaau3 joeng5",en:"Grandparents raising grandchildren"},
      {zh:"老豆",jp:"lou5 dau6",en:"Dad (colloquial — more casual than 爸爸)"},
      {zh:"老母",jp:"lou5 mou5",en:"Mum (colloquial — casual)"},
      {zh:"嫲嫲",jp:"maa4 maa4",en:"Paternal grandma (colloquial Cantonese)"}]},{title:"Relationships",zh:"人際關係",vocab:[{zh:"友誼",jp:"jau5 ji6",en:"Friendship"},{zh:"信任",jp:"seon3 jam6",en:"Trust"},{zh:"溝通",jp:"kau1 tung1",en:"Communication"},{zh:"誤解",jp:"ng6 gaai2",en:"Misunderstanding"},{zh:"和解",jp:"wo4 gaai2",en:"Reconciliation"},{zh:"衝突",jp:"cung1 dat6",en:"Conflict"},{zh:"包容",jp:"baau1 jung4",en:"Tolerance / Acceptance"},{zh:"尊重",jp:"zyun1 zung6",en:"Respect"},{zh:"界線",jp:"gaai3 sin3",en:"Boundaries"},{zh:"依賴",jp:"ji1 laai6",en:"Dependence / Rely on"}]},{title:"Family Phrases",zh:"家庭用語",vocab:[{zh:"你哋一家幾口人？",jp:"nei5 dei6 jat1 gaa1 gei2 hau2 jan4?",en:"How many people are in your family?"},{zh:"你同你父母住係埋？",jp:"nei5 tung4 nei5 fu6 mou5 zyu6 hai6 maai4?",en:"Do you live with your parents?"},{zh:"家人之間要多溝通",jp:"gaa1 jan4 zi1 gaan1 jiu3 do1 kau1 tung1",en:"Family members need to communicate more"},{zh:"我好掛住屋企人",jp:"ngo5 hou2 gwaa3 zyu6 uk1 kei2 jan4",en:"I really miss my family"},{zh:"佢哋離婚喇",jp:"keoi5 dei6 lei4 fan1 laa3",en:"They got divorced"},
      {zh:"屋企人",jp:"uk1 kei2 jan4",en:"Family / Household (colloquial — 屋企 = home)"},
      {zh:"湊仔女",jp:"cau3 zai2 neoi5",en:"Raise / Look after children (colloquial)"}]}],dialogue:{title:"Dialogue: Family Dynamics",lines:[{sp:"A",zh:"你最近好似好忙，屋企人有冇投訴你？",jp:"nei5 zeoi3 gan6 hou2 ci5 hou2 mong4, uk1 kei2 jan4 jau5 mou5 tau4 sou3 nei5?",en:"You seem very busy lately. Have your family members complained?"},{sp:"B",zh:"係囉，老婆話我唔夠時間陪佢同仔女。其實我都知係我問題，但係份工真係好忙。",jp:"hai6 lo3, lou5 po4 waa6 ngo5 m4 gau3 si4 gaan3 pui4 keoi5 tung4 zai2 neoi5. kei4 sat6 ngo5 dou1 zi1 hai6 ngo5 man6 tai4, daan6 hai6 fan6 gung1 zan1 hai6 hou2 mong4.",en:"Yeah, my wife says I don't spend enough time with her and the kids. I know it's my problem, but work is really busy."},{sp:"A",zh:"家人之間要多溝通。你有冇試過同老婆坦白講，一起諗方法？",jp:"gaa1 jan4 zi1 gaan1 jiu3 do1 kau1 tung1. nei5 jau5 mou5 si3 gwo3 tung4 lou5 po4 taan2 baak6 gong2, jat1 cei4 nam2 fong1 faat3?",en:"Family members need more communication. Have you tried being honest with your wife and figuring things out together?"},{sp:"B",zh:"傾過喇，佢好體諒，但係我覺得自己好愧疚。工作同家庭要平衡，真係唔容易。",jp:"king1 gwo3 laa3, keoi5 hou2 tai2 loeng6, daan6 hai6 ngo5 gok3 dak1 zi6 gei2 hou2 kwai5 gau3. gung1 zok3 tung4 gaa1 ting4 jiu3 ping4 hang4, zan1 hai6 m4 jung4 ji6.",en:"We've talked. She's very understanding, but I feel really guilty. Balancing work and family is truly not easy."},{sp:"A",zh:"係唔容易，但係尊重同包容係最重要嘅。你屋企人係愛你㗎，一齊努力。",jp:"hai6 m4 jung4 ji6, daan6 hai6 zyun1 zung6 tung4 baau1 jung4 hai6 zeoi3 zung6 jiu3 ge3. nei5 uk1 kei2 jan4 hai6 oi3 nei5 gaa3, jat1 cei4 nou5 lik6.",en:"It's not easy, but respect and tolerance are what matter most. Your family loves you — work on it together."}]}},
  {id:12,zh:"宗教與哲學",en:"Religion & Philosophy",sections:[{title:"Religions",zh:"宗教",vocab:[{zh:"佛教",jp:"fat6 gaau3",en:"Buddhism"},{zh:"基督教",jp:"gei1 duk6 gaau3",en:"Christianity"},{zh:"天主教",jp:"tin1 zyu2 gaau3",en:"Catholicism"},{zh:"伊斯蘭教",jp:"ji1 si1 laan4 gaau3",en:"Islam"},{zh:"猶太教",jp:"jau4 taai3 gaau3",en:"Judaism"},{zh:"道教",jp:"dou6 gaau3",en:"Taoism"},{zh:"儒家思想",jp:"jyu4 gaa1 si1 soeng2",en:"Confucianism"},{zh:"無神論",jp:"mou4 san4 leon6",en:"Atheism"},{zh:"靈性",jp:"ling4 sing3",en:"Spirituality"},{zh:"冥想",jp:"ming4 soeng2",en:"Meditation"},{zh:"禱告",jp:"dou6 gou3",en:"Prayer"},{zh:"寺廟",jp:"zi6 miu6",en:"Temple"},
      {zh:"拜神",jp:"baai3 san4",en:"Pray to gods / Worship at temple (colloquial)"},
      {zh:"燒香",jp:"siu1 hoeng1",en:"Burn incense (colloquial)"},
      {zh:"求籤",jp:"kau4 cim1",en:"Draw fortune sticks at temple (colloquial)"}]},{title:"Philosophy",zh:"哲學",vocab:[{zh:"哲學",jp:"zit3 hok6",en:"Philosophy"},{zh:"倫理",jp:"leon4 lei5",en:"Ethics"},{zh:"道德",jp:"dou6 dak1",en:"Morality"},{zh:"存在主義",jp:"cyun4 zoi6 zyu2 ji6",en:"Existentialism"},{zh:"命運",jp:"ming6 wan6",en:"Fate / Destiny"},{zh:"自由意志",jp:"zi6 jau4 ji3 zi3",en:"Free will"},{zh:"意義",jp:"ji3 ji6",en:"Meaning / Purpose"},{zh:"真理",jp:"zan1 lei5",en:"Truth"},{zh:"因果",jp:"jan1 gwo2",en:"Cause and effect / Karma"},{zh:"意識",jp:"ji3 sik1",en:"Consciousness"}]},{title:"Religion & Philosophy Phrases",zh:"宗教與哲學用語",vocab:[{zh:"你信唔信教？",jp:"nei5 seon3 m4 seon3 gaau3?",en:"Are you religious?"},{zh:"生命嘅意義係咩？",jp:"sang1 ming6 ge3 ji3 ji6 hai6 me1?",en:"What is the meaning of life?"},{zh:"我相信因果報應",jp:"ngo5 soeng1 seon3 jan1 gwo2 bou3 jing3",en:"I believe in karma"},{zh:"呢個係一個道德問題",jp:"ni1 go3 hai6 jat1 go3 dou6 dak1 man6 tai4",en:"This is an ethical question"},{zh:"佛教講求慈悲",jp:"fat6 gaau3 gong2 kau4 ci4 bei1",en:"Buddhism emphasizes compassion"},
      {zh:"信唔信由你",jp:"seon3 m4 seon3 jau4 nei5",en:"Believe it or not (colloquial)"}]}],dialogue:{title:"Dialogue: Belief and Meaning",lines:[{sp:"A",zh:"你有冇信仰㗎？我最近開始對佛教有興趣。",jp:"nei5 jau5 mou5 seon3 joeng5 gaa3? ngo5 zeoi3 gan6 hoi1 ci2 deoi3 fat6 gaau3 jau5 hing3 ceoi3.",en:"Do you have any religious beliefs? I've recently become interested in Buddhism."},{sp:"B",zh:"我係無神論者，但係我尊重所有宗教。你係點解對佛教感興趣㗎？",jp:"ngo5 hai6 mou4 san4 leon6 ze2, daan6 hai6 ngo5 zyun1 zung6 so2 jau5 zung1 gaau3. nei5 hai6 dim2 gaai2 deoi3 fat6 gaau3 gam2 hing3 ceoi3 gaa3?",en:"I'm an atheist, but I respect all religions. What got you interested in Buddhism?"},{sp:"A",zh:"係因為佢嘅哲學，特別係關於苦難同慈悲嘅概念，令我覺得好有共鳴。",jp:"hai6 jan1 wai6 keoi5 ge3 zit3 hok6, dak6 bit6 hai6 gwaan1 jyu1 fu2 naan6 tung4 ci4 bei1 ge3 goi3 nim6, ling6 ngo5 gok3 dak1 hou2 jau5 gung6 ming4.",en:"It's the philosophy — especially the concepts of suffering and compassion — that I really resonate with."},{sp:"B",zh:"我明白。其實哲學同宗教有時係殊途同歸，都係探討生命嘅意義。",jp:"ngo5 ming4 baak6. kei4 sat6 zit3 hok6 tung4 zung1 gaau3 jau5 si4 hai6 syu1 tou4 tung4 gwai1, dou1 hai6 taam3 tou2 sang1 ming6 ge3 ji3 ji6.",en:"I understand. Philosophy and religion often arrive at the same place by different routes — both explore the meaning of life."},{sp:"A",zh:"係，我覺得無論信唔信教，對道德同倫理有自己嘅反思係好重要㗎。",jp:"hai6, ngo5 gok3 dak1 mou4 leon6 seon3 m4 seon3 gaau3, deoi3 dou6 dak1 tung4 leon4 lei5 jau5 zi6 gei2 ge3 faan2 si1 hai6 hou2 zung6 jiu3 gaa3.",en:"Yes, I think regardless of whether you're religious, reflecting on morality and ethics for yourself is very important."}]}},
  {id:13,zh:"天氣與自然",en:"Weather & Nature",sections:[{title:"Weather",zh:"天氣",vocab:[{zh:"晴天",jp:"cing4 tin1",en:"Sunny / Clear sky"},{zh:"陰天",jp:"jam1 tin1",en:"Cloudy / Overcast"},{zh:"落雨",jp:"lok6 jyu5",en:"Raining"},{zh:"颱風",jp:"toi4 fung1",en:"Typhoon"},{zh:"閃電",jp:"sim2 din6",en:"Lightning"},{zh:"打雷",jp:"daa2 leoi4",en:"Thunder"},{zh:"大霧",jp:"daai6 mou6",en:"Heavy fog"},{zh:"潮濕",jp:"ciu4 sap1",en:"Humid"},{zh:"乾燥",jp:"gon1 zou6",en:"Dry"},{zh:"寒冷",jp:"hon4 laang5",en:"Cold"},{zh:"炎熱",jp:"jim4 jit6",en:"Hot / Scorching"},{zh:"天氣預報",jp:"tin1 hei3 jyu6 bou3",en:"Weather forecast"},
      {zh:"落大雨",jp:"lok6 daai6 jyu5",en:"Pouring rain (colloquial)"},
      {zh:"打風",jp:"daa2 fung1",en:"Typhoon coming / Typhoon season (HK colloquial)"},
      {zh:"凍到震",jp:"dung3 dou3 zan3",en:"Shivering cold (colloquial hyperbole)"},
      {zh:"熱到冇命",jp:"jit6 dou3 mou5 ming6",en:"Unbearably hot (colloquial hyperbole)"}]},{title:"Nature & Environment",zh:"自然與環境",vocab:[{zh:"森林",jp:"sam1 lam4",en:"Forest"},{zh:"河流",jp:"ho4 lau4",en:"River"},{zh:"海洋",jp:"hoi2 joeng4",en:"Ocean / Sea"},{zh:"野生動物",jp:"je5 sang1 dung6 mat6",en:"Wildlife"},{zh:"環境保護",jp:"waan4 ging2 bou2 wu6",en:"Environmental protection"},{zh:"污染",jp:"wu1 jim5",en:"Pollution"},{zh:"可持續發展",jp:"ho2 ci4 zeoi6 faat3 jin2",en:"Sustainable development"},{zh:"碳排放",jp:"taan3 paai4 fong3",en:"Carbon emissions"},{zh:"全球暖化",jp:"cyun4 kau4 nyun5 faa3",en:"Global warming"},{zh:"瀕危物種",jp:"ban1 ngai4 mat6 zung2",en:"Endangered species"}]},{title:"Weather Phrases",zh:"天氣用語",vocab:[{zh:"今日天氣點㗎？",jp:"gam1 jat6 tin1 hei3 dim2 gaa3?",en:"What's the weather like today?"},{zh:"聽日會唔會落雨？",jp:"ting1 jat6 wui5 m4 wui5 lok6 jyu5?",en:"Will it rain tomorrow?"},{zh:"颱風打幾號波？",jp:"toi4 fung1 daa2 gei2 hou6 bo1?",en:"What typhoon signal is up?"},{zh:"香港嘅夏天好熱好潮濕",jp:"hoeng1 gong2 ge3 haa6 tin1 hou2 jit6 hou2 ciu4 sap1",en:"Hong Kong summers are very hot and humid"},{zh:"我哋要珍惜大自然",jp:"ngo5 dei6 jiu3 zan1 sik1 daai6 zi6 jin4",en:"We must cherish nature"},
      {zh:"出八號波喇",jp:"ceot1 baat3 hou6 bo1 laa3",en:"Typhoon Signal 8 is up! (HK colloquial — means no work/school)"}]}],dialogue:{title:"Dialogue: Weather and Environment",lines:[{sp:"A",zh:"而家天氣真係愈嚟愈極端，今年夏天熱到嚇人。",jp:"ji4 gaa1 tin1 hei3 zan1 hai6 jyu6 lei4 jyu6 gik6 dyun1, gam1 nin4 haa6 tin1 jit6 dou3 haat3 jan4.",en:"The weather is getting more and more extreme. This summer has been frighteningly hot."},{sp:"B",zh:"係囉，全球暖化嘅影響愈嚟愈明顯。碳排放問題真係要認真處理。",jp:"hai6 lo3, cyun4 kau4 nyun5 faa3 ge3 jing2 hoeng2 jyu6 lei4 jyu6 ming4 hin2. taan3 paai4 fong3 man6 tai4 zan1 hai6 jiu3 jan6 zan1 cyu5 lei5.",en:"Yeah, the effects of global warming are becoming more and more obvious. Carbon emissions really need to be seriously addressed."},{sp:"A",zh:"係，但係好多國家仲係淨係講，唔做嘢。可持續發展係得個講字？",jp:"hai6, daan6 hai6 hou2 do1 gwok3 gaa1 zung6 hai6 zing6 hai6 gong2, m4 zou6 je5. ho2 ci4 zeoi6 faat3 jin2 hai6 dak1 go3 gong2 zi6?",en:"Yes, but many countries are still just talking and not doing anything. Is sustainable development just empty words?"},{sp:"B",zh:"唔可以咁悲觀，個人嘅行動都係有意義㗎。少用即棄塑膠、減少浪費，每個人都可以出一份力。",jp:"m4 ho2 ji5 gam2 bei1 gwun1, go3 jan4 ge3 hang4 dung6 dou1 hai6 jau5 ji3 ji6 gaa3. siu2 jung6 zik1 hei3 sou3 giu1, gaam2 siu2 long6 fai3, mui5 go3 jan4 dou1 ho2 yi5 ceot1 jat1 fan6 lik6.",en:"Don't be so pessimistic — individual actions do matter. Use fewer single-use plastics, reduce waste — everyone can contribute."}]}},
  {id:14,zh:"歷史與文化",en:"History & Culture",sections:[{title:"History",zh:"歷史",vocab:[{zh:"朝代",jp:"ciu4 doi6",en:"Dynasty"},{zh:"革命",jp:"gaak3 ming6",en:"Revolution"},{zh:"戰爭",jp:"zin3 zang1",en:"War"},{zh:"殖民地",jp:"zik6 man4 dei6",en:"Colony / Colonial"},{zh:"獨立",jp:"duk6 laap6",en:"Independence"},{zh:"帝國",jp:"dai3 gwok3",en:"Empire"},{zh:"文化大革命",jp:"man4 faa3 daai6 gaak3 ming6",en:"Cultural Revolution"},{zh:"鴉片戰爭",jp:"aa3 pin3 zin3 zang1",en:"Opium War"},{zh:"冷戰",jp:"laang5 zin3",en:"Cold War"},{zh:"全球化",jp:"cyun4 kau4 faa3",en:"Globalization"},
      {zh:"九七回歸",jp:"gau2 cat1 wui4 gwai1",en:"1997 Handover (HK colloquial reference)"}]},{title:"Culture & Traditions",zh:"文化與傳統",vocab:[{zh:"傳統",jp:"cyun4 tung2",en:"Tradition"},{zh:"風俗",jp:"fung1 zuk6",en:"Custom / Folk custom"},{zh:"節日",jp:"zit3 jat6",en:"Festival / Holiday"},{zh:"農曆新年",jp:"nung4 lik6 san1 nin4",en:"Lunar New Year"},{zh:"清明節",jp:"cing1 ming4 zit3",en:"Qingming Festival"},{zh:"中秋節",jp:"zung1 cau1 zit3",en:"Mid-Autumn Festival"},{zh:"藝術",jp:"ngai6 seot6",en:"Art"},{zh:"文學",jp:"man4 hok6",en:"Literature"},{zh:"遺產",jp:"wai4 caan2",en:"Heritage / Legacy"},{zh:"身份認同",jp:"san1 fan6 jan6 tung4",en:"Identity"},
      {zh:"老餅",jp:"lou5 beng2",en:"Old-fashioned / Out of touch (colloquial — lit. old biscuit)"},
      {zh:"本土",jp:"bun2 tou2",en:"Local / Homegrown (HK colloquial identity term)"},
      {zh:"獅子山精神",jp:"si1 zi2 saan1 zing1 san4",en:"Lion Rock spirit — HK resilience (colloquial cultural reference)"}]},{title:"History & Culture Phrases",zh:"歷史文化用語",vocab:[{zh:"你對中國歷史有幾了解？",jp:"nei5 deoi3 zung1 gwok3 lik6 si2 jau5 gei2 liu5 gaai2?",en:"How much do you know about Chinese history?"},{zh:"傳統文化值得保留",jp:"cyun4 tung2 man4 faa3 zik6 dak1 bou2 lau4",en:"Traditional culture is worth preserving"},{zh:"歷史係由勝利者書寫",jp:"lik6 si2 hai6 jau4 sing3 lei6 ze2 syu1 se2",en:"History is written by the victors"},{zh:"香港有獨特嘅文化身份",jp:"hoeng1 gong2 jau5 duk6 dak6 ge3 man4 faa3 san1 fan6",en:"Hong Kong has a unique cultural identity"}]}],dialogue:{title:"Dialogue: Cultural Identity",lines:[{sp:"A",zh:"你覺得香港嘅文化係點樣嘅？",jp:"nei5 gok3 dak1 hoeng1 gong2 ge3 man4 faa3 hai6 dim2 joeng2 ge3?",en:"What do you think Hong Kong's culture is like?"},{sp:"B",zh:"我覺得香港係一個好獨特嘅地方，中西文化交融，有自己嘅身份認同。",jp:"ngo5 gok3 dak1 hoeng1 gong2 hai6 jat1 go3 hou2 duk6 dak6 ge3 dei6 fong1, zung1 sai1 man4 faa3 gaau1 jung4, jau5 zi6 gei2 ge3 san1 fan6 jan6 tung4.",en:"I think Hong Kong is a very unique place — a blend of Chinese and Western cultures with its own distinct identity."},{sp:"A",zh:"係，但係近年嚟，好多人擔心呢種獨特嘅文化會慢慢消失。",jp:"hai6, daan6 hai6 gan6 nin4 lei4, hou2 do1 jan4 daam1 sam1 ni1 zung2 duk6 dak6 ge3 man4 faa3 wui5 maan6 maan2 siu1 sat1.",en:"Yes, but in recent years many people worry this unique culture will gradually disappear."},{sp:"B",zh:"我明白呢個擔憂。所以保護廣東話、傳統節日同本土文化係好重要㗎。",jp:"ngo5 ming4 baak6 ni1 go3 daam1 jau1. so2 ji5 bou2 wu6 gwong2 dung1 waa2, cyun4 tung2 zit3 jat6 tung4 bun2 tou2 man4 faa3 hai6 hou2 zung6 jiu3 gaa3.",en:"I understand that concern. That's why protecting Cantonese, traditional festivals, and local culture is so important."},{sp:"A",zh:"係囉，歷史同文化係我哋嘅根，唔可以輕易放棄。",jp:"hai6 lo3, lik6 si2 tung4 man4 faa3 hai6 ngo5 dei6 ge3 gan1, m4 ho2 ji5 hing1 ji6 fong3 hei3.",en:"Exactly. History and culture are our roots — we can't easily abandon them."}]}},
  {id:15,zh:"購物與金錢",en:"Shopping & Money",sections:[{title:"Shopping",zh:"購物",vocab:[{zh:"商場",jp:"soeng1 coeng4",en:"Shopping mall"},{zh:"超級市場",jp:"ciu1 kap1 si5 coeng4",en:"Supermarket"},{zh:"網購",jp:"mong5 kau3",en:"Online shopping"},{zh:"折扣",jp:"zit3 kau3",en:"Discount"},{zh:"特價",jp:"dak6 gaa3",en:"Sale / Special price"},{zh:"退貨",jp:"teoi3 fo3",en:"Return (merchandise)"},{zh:"收據",jp:"sau1 geoi3",en:"Receipt"},{zh:"試身室",jp:"si3 san1 sat1",en:"Fitting room"},{zh:"貴",jp:"gwai3",en:"Expensive"},{zh:"平",jp:"peng4",en:"Cheap / Affordable"},{zh:"討價還價",jp:"tou2 gaa3 waan4 gaa3",en:"Bargain / Haggle"},{zh:"購物車",jp:"kau3 mat6 ce1",en:"Shopping cart"},
      {zh:"劈價",jp:"pek3 gaa3",en:"Slash the price / Bargain hard (colloquial)"},
      {zh:"執平貨",jp:"zap1 peng4 fo3",en:"Hunt for bargains (colloquial)"}]},{title:"Money",zh:"金錢",vocab:[{zh:"現金",jp:"jin6 gam1",en:"Cash"},{zh:"八達通",jp:"baat3 daat6 tung1",en:"Octopus card"},{zh:"找錢",jp:"zaau2 cin2",en:"Change (money back)"},{zh:"匯率",jp:"wui6 leot6",en:"Exchange rate"},{zh:"港幣",jp:"gong2 bai6",en:"Hong Kong Dollar"},{zh:"人民幣",jp:"jan4 man4 bai6",en:"Chinese Yuan (RMB)"},{zh:"美金",jp:"mei5 gam1",en:"US Dollar"},{zh:"儲錢",jp:"cou5 cin2",en:"Save money"},{zh:"破費",jp:"po3 fai3",en:"Spend a lot / Splurge"},{zh:"窮",jp:"kung4",en:"Poor / Broke"}]},{title:"Shopping Phrases",zh:"購物用語",vocab:[{zh:"呢件幾多錢？",jp:"ni1 gin6 gei2 do1 cin2?",en:"How much does this cost?"},{zh:"有冇平啲㗎？",jp:"jau5 mou5 peng4 di1 gaa3?",en:"Is there anything cheaper?"},{zh:"可唔可以平啲？",jp:"ho2 m4 ho2 yi5 peng4 di1?",en:"Can you make it cheaper?"},{zh:"我要試吓先",jp:"ngo5 jiu3 si3 haa5 sin1",en:"I want to try it first"},{zh:"呢件有冇大碼㗎？",jp:"ni1 gin6 jau5 mou5 daai6 maa5 gaa3?",en:"Do you have this in a larger size?"},
      {zh:"買一送一",jp:"maai5 jat1 sung3 jat1",en:"Buy one get one free (colloquial)"},
      {zh:"斷貨",jp:"tyun5 fo3",en:"Sold out / Out of stock (colloquial)"}]}],dialogue:{title:"Dialogue: Shopping at the Market",lines:[{sp:"A",zh:"呢件衫幾靚喎，幾多錢㗎？",jp:"ni1 gin6 saam1 gei2 leng3 wo3, gei2 do1 cin2 gaa3?",en:"This top looks really nice — how much is it?"},{sp:"B",zh:"三百蚊，但係而家特價，兩百五。",jp:"saam1 baak3 man1, daan6 hai6 ji4 gaa1 dak6 gaa3, loeng5 baak3 ng5.",en:"Three hundred dollars, but it's on sale now — two fifty."},{sp:"A",zh:"仲係貴喎，可唔可以再平啲？我買兩件。",jp:"zung6 hai6 gwai3 wo3, ho2 m4 ho2 yi5 zoi3 peng4 di1? ngo5 maai5 loeng5 gin6.",en:"Still a bit expensive. Can you make it cheaper? I'll buy two."},{sp:"B",zh:"買兩件嘅話，每件兩百二，點？",jp:"maai5 loeng5 gin6 ge3 waa6, mui5 gin6 loeng5 baak3 ji6, dim2?",en:"If you buy two, it's two hundred and twenty each. Deal?"},{sp:"A",zh:"好，成交！你哋係咪可以用八達通付款㗎？",jp:"hou2, sing4 gaau1! nei5 dei6 hai6 mai6 ho2 yi5 jung6 baat3 daat6 tung1 fu6 fun2 gaa3?",en:"Okay, deal! Can I pay with Octopus card?"}]}},
  {id:16,zh:"價值觀與品格",en:"Values & Character",sections:[{title:"Core Values",zh:"核心價值觀",vocab:[{zh:"誠實",jp:"sing4 sat6",en:"Honesty"},{zh:"正直",jp:"zing3 zik6",en:"Integrity"},{zh:"忠誠",jp:"zung1 sing4",en:"Loyalty"},{zh:"謙遜",jp:"him1 seon3",en:"Humility"},{zh:"驕傲",jp:"giu1 ngou6",en:"Pride (in a positive sense)"},{zh:"自尊",jp:"zi6 zyun1",en:"Self-respect / Dignity"},{zh:"勇氣",jp:"jung5 hei3",en:"Courage"},{zh:"責任",jp:"zaak3 jam6",en:"Responsibility"},{zh:"慷慨",jp:"hong1 koi3",en:"Generosity"},{zh:"同理心",jp:"tung4 lei5 sam1",en:"Empathy"},{zh:"寬恕",jp:"fun1 syu3",en:"Forgiveness"},{zh:"毅力",jp:"ngai6 lik6",en:"Perseverance / Grit"},
      {zh:"夠義氣",jp:"gau3 ji6 hei3",en:"Loyal to friends / Got your back (colloquial — key HK value)"},
      {zh:"唔好意思",jp:"m4 hou2 ji3 si1",en:"Excuse me / Sorry / Embarrassed (colloquial multipurpose)"}]},{title:"Face & Social Values",zh:"面子與社會價值觀",vocab:[{zh:"面子",jp:"min6 zi2",en:"Face / Social dignity"},{zh:"丟臉",jp:"diu1 lim2",en:"Lose face"},{zh:"羞恥",jp:"sau1 ci2",en:"Shame"},{zh:"仁義",jp:"jan4 ji6",en:"Benevolence and righteousness"},{zh:"孝順",jp:"haau3 seon6",en:"Filial piety"},{zh:"公平",jp:"gung1 ping4",en:"Fairness"},{zh:"正義",jp:"zing3 ji6",en:"Justice"},{zh:"誠信",jp:"sing4 seon3",en:"Good faith / Trustworthiness"},{zh:"包容",jp:"baau1 jung4",en:"Tolerance / Inclusiveness"},{zh:"感恩",jp:"gam2 jan1",en:"Gratitude / Thankfulness"},
      {zh:"衰",jp:"seoi1",en:"Bad / Lousy / Shameful (colloquial all-purpose negative)"},
      {zh:"益街坊",jp:"jik1 gaai1 fong1",en:"Be generous to locals / Give a good deal (colloquial)"}]},{title:"Values in Conversation",zh:"價值觀對話",vocab:[{zh:"你最重視咩價值觀？",jp:"nei5 zeoi3 zung6 si6 me1 gaa3 zik6 gun1?",en:"What values do you value most?"},{zh:"誠實係做人最基本嘅原則",jp:"sing4 sat6 hai6 zou6 jan4 zeoi3 gei1 bun2 ge3 jyun4 zak1",en:"Honesty is the most basic principle in life"},{zh:"要有勇氣承認自己嘅錯誤",jp:"jiu3 jau5 jung5 hei3 sing6 jin6 zi6 gei2 ge3 co3 ng6",en:"It takes courage to admit your mistakes"},{zh:"面子唔係最重要㗎",jp:"min6 zi2 m4 hai6 zeoi3 zung6 jiu3 gaa3",en:"Face is not the most important thing"},{zh:"孝順父母係中國文化嘅核心",jp:"haau3 seon6 fu6 mou5 hai6 zung1 gwok3 man4 faa3 ge3 hak6 sam1",en:"Filial piety is at the heart of Chinese culture"},
      {zh:"講得出做得到",jp:"gong2 dak1 ceot1 zou6 dak1 dou3",en:"Walk the talk (colloquial saying)"},
      {zh:"唔好咁串",jp:"m4 hou2 gam3 cyun3",en:"Don't be so arrogant / cocky (colloquial)"}]}],dialogue:{title:"Dialogue: What Matters Most",lines:[{sp:"A",zh:"你覺得一個人最重要嘅品格係咩？",jp:"nei5 gok3 dak1 jat1 go3 jan4 zeoi3 zung6 jiu3 ge3 ban2 gaak3 hai6 me1?",en:"What do you think is the most important character trait in a person?"},{sp:"B",zh:"我覺得係誠實同正直。一個人可以冇本事，但係唔可以冇誠信。",jp:"ngo5 gok3 dak1 hai6 sing4 sat6 tung4 zing3 zik6. jat1 go3 jan4 ho2 yi5 mou5 bun2 si6, daan6 hai6 m4 ho2 yi5 mou5 sing4 seon3.",en:"I think it's honesty and integrity. A person can lack talent, but they can't lack trustworthiness."},{sp:"A",zh:"我同意，但係我仲好重視同理心。有時候，能夠理解他人嘅感受，比任何嘢都重要。",jp:"ngo5 tung4 ji3, daan6 hai6 ngo5 zung6 hou2 zung6 si6 tung4 lei5 sam1. jau5 si4 hau6, nang4 gau3 lei5 gaai2 taa1 jan4 ge3 gam2 sau6, bei2 jam6 ho4 je5 dou1 zung6 jiu3.",en:"I agree, but I also value empathy highly. Sometimes, being able to understand others' feelings is more important than anything."},{sp:"B",zh:"係。仲有，我覺得謙遜好重要。驕傲唔係壞事，但係唔可以自大。",jp:"hai6. zung6 jau5, ngo5 gok3 dak1 him1 seon3 hou2 zung6 jiu3. giu1 ngou6 m4 hai6 waai6 si6, daan6 hai6 m4 ho2 yi5 zi6 daai6.",en:"Yes. Also, I think humility is very important. Pride isn't bad, but you can't be arrogant."},{sp:"A",zh:"係囉。而家社會好多人太重視面子，反而忽略咗真正重要嘅嘢，例如家人同健康。",jp:"hai6 lo3. ji4 gaa1 se5 wui2 hou2 do1 jan4 taai3 zung6 si6 min6 zi2, faan2 ji4 fat1 loek6 zo2 zan1 zing3 zung6 jiu3 ge3 je5, lai6 jyu4 gaa1 jan4 tung4 gin6 hong1.",en:"Exactly. Nowadays many people care too much about face, and in doing so neglect what's truly important — like family and health."}]}}

  dialogue:{
    title:"Dialogue: Lunar New Year",
    lines:[
      {sp:"A",zh:"恭喜發財！新年快樂！今年有冇派利是呀？",jp:"gung1 hei2 faat3 coi4! san1 nin4 faai3 lok6! gam1 nin4 jau5 mou5 paai3 lei6 si6 aa3?",en:"Gung Hei Fat Choy! Happy New Year! Are you giving out red packets this year?"},
      {sp:"B",zh:"梗係啦，我已經結咗婚，唔派唔得㗎！你呢，幾時擺酒呀？",jp:"gang2 hai6 laa1, ngo5 ji5 ging1 git3 zo2 fan1, m4 paai3 m4 dak1 gaa3! nei5 ne1, gei2 si4 baai2 zau2 aa3?",en:"Of course — I'm married now, I have no choice! What about you, when's your wedding banquet?"},
      {sp:"A",zh:"仲早呀，未拍拖㗎！不過今年行大運，搞唔好有消息㗎。",jp:"zung6 zou2 aa3, mei6 paak3 to1 gaa3! bat1 gwo3 gam1 nin4 hang4 daai6 wan6, gaau2 m4 hou2 jau5 siu1 sik1 gaa3.",en:"Way too early — I'm not even dating anyone! But this year I'm on a lucky streak, who knows there might be news."},
      {sp:"B",zh:"哈哈，借你口吉！我哋今晚去阿媽度食冬前飯，你嚟唔嚟？",jp:"haa1 haa1, ze3 nei5 hau2 gat1! ngo5 dei6 gam1 maan5 heoi3 aa3 maa1 dou6 sik6 dung1 cin4 faan6, nei5 lei4 m4 lei4?",en:"Haha, from your mouth to God's ears! We're going to mum's for the Winter Solstice dinner tonight — are you coming?"},
      {sp:"A",zh:"當然嚟啦，食湯圓囉！我帶年糕過去㗎。",jp:"dong1 jin4 lei4 laa1, sik6 tong1 jyun4 lo3! ngo5 daai3 nin4 gou1 gwo3 heoi3 gaa3.",en:"Of course I'm coming — time for glutinous rice balls! I'll bring the New Year cake."},
    ]
  }

  id:18,zh:"讚美、寒暄與感情",en:"Compliments, Small Talk & Romance",
  sections:[
    { title:"Compliments & Praise", zh:"讚美與稱讚", vocab:[
      {zh:"好靚喎",jp:"hou2 leng3 wo3",en:"Wow, so pretty/beautiful (colloquial exclamation)"},
      {zh:"好型喎",jp:"hou2 jing4 wo3",en:"Wow, so cool/stylish (colloquial, esp. for guys)"},
      {zh:"你好叻㗎",jp:"nei5 hou2 lek1 gaa3",en:"You're so capable/talented (colloquial)"},
      {zh:"你煮嘢食好好味",jp:"nei5 zyu2 je5 sik6 hou2 hou2 mei6",en:"Your cooking is delicious"},
      {zh:"你個髮型好好睇",jp:"nei5 go3 faat3 jing4 hou2 hou2 tai2",en:"Your hairstyle looks great"},
      {zh:"你今日著得好靚",jp:"nei5 gam1 jat6 zoek3 dak1 hou2 leng3",en:"You're dressed really nicely today"},
      {zh:"過獎喇",jp:"gwo3 zoeng2 laa3",en:"You flatter me / You're too kind (humble response)"},
      {zh:"唔係啩",jp:"m4 hai6 gwaa3",en:"No way / Really? (modest deflection, colloquial)"},
      {zh:"係咁話㗎",jp:"hai6 gam2 waa6 gaa3",en:"That's what they say / So they say (deflecting praise)"},
    ]},
    { title:"Small Talk & Social Phrases", zh:"寒暄與閒聊", vocab:[
      {zh:"食咗飯未？",jp:"sik6 zo2 faan6 mei6?",en:"Have you eaten yet? (common Cantonese greeting)"},
      {zh:"去邊呀？",jp:"heoi3 bin1 aa3?",en:"Where are you off to? (casual greeting, not literal)"},
      {zh:"得閒飲茶",jp:"dak1 haan4 jam2 caa4",en:"Let's catch up over dim sum sometime (colloquial, casual invite)"},
      {zh:"冇乜，你呢？",jp:"mou5 mat1, nei5 ne1?",en:"Not much, what about you? (reply to 點呀)"},
      {zh:"係噉㗎喇",jp:"hai6 gam2 gaa3 laa3",en:"That's just how it is / Such is life (colloquial resignation)"},
      {zh:"唔講得定",jp:"m4 gong2 dak1 ding6",en:"Hard to say / You never know (colloquial)"},
      {zh:"睇吓先",jp:"tai2 haa5 sin1",en:"See how it goes / Let's wait and see (colloquial)"},
      {zh:"無端端",jp:"mou4 dyun1 dyun1",en:"Out of nowhere / For no reason (colloquial)"},
      {zh:"係咁先",jp:"hai6 gam2 sin1",en:"That's it for now / Let's leave it here (wrapping up)"},
    ]},
    { title:"Romance & Relationships", zh:"感情與戀愛", vocab:[
      {zh:"拍拖",jp:"paak3 to1",en:"Dating / In a relationship (Cantonese colloquial)"},
      {zh:"有冇拍拖？",jp:"jau5 mou5 paak3 to1?",en:"Are you seeing anyone? (colloquial)"},
      {zh:"單身",jp:"daan1 san1",en:"Single"},
      {zh:"暗戀",jp:"am3 lyun2",en:"Secret crush / Unrequited love"},
      {zh:"表白",jp:"biu2 baak6",en:"Confess feelings / Ask someone out"},
      {zh:"拍散拖",jp:"paak3 saan3 to1",en:"Casual dating / No strings attached (colloquial)"},
      {zh:"分手",jp:"fan1 sau2",en:"Break up"},
      {zh:"舊愛",jp:"gau6 oi3",en:"Ex / Old flame (colloquial)"},
      {zh:"另一半",jp:"ling6 jat1 bun3",en:"Other half / Partner"},
      {zh:"拍拖周年",jp:"paak3 to1 zau1 nin4",en:"Dating anniversary (colloquial)"},
      {zh:"好有緣",jp:"hou2 jau5 jyun4",en:"It's fate / What a coincidence (romantic context)"},
      {zh:"傾吓偈",jp:"king1 haa5 gai3",en:"Have a chat / Get to know each other (colloquial)"},
    ]},
  ],
  dialogue:{
    title:"Dialogue: Catching Up",
    lines:[
      {sp:"A",zh:"嘩，你今日著得好靚喎！去邊呀？",jp:"waa3, nei5 gam1 jat6 zoek3 dak1 hou2 leng3 wo3! heoi3 bin1 aa3?",en:"Wow, you look amazing today! Where are you off to?"},
      {sp:"B",zh:"唔係囉，普普通通咋。同朋友去食飯，得閒嘅。你呢，食咗飯未？",jp:"m4 hai6 lo3, pou2 pou2 tung1 tung1 zaa3. tung4 pang4 jau5 heoi3 sik6 faan6, dak1 haan4 ge3. nei5 ne1, sik6 zo2 faan6 mei6?",en:"No lah, just casual. Going for dinner with a friend, nothing special. What about you — have you eaten?"},
      {sp:"A",zh:"未呀。你嗰個朋友係咪你暗戀嗰個呀？",jp:"mei6 aa3. nei5 go2 go3 pang4 jau5 hai6 mai6 nei5 am3 lyun2 go2 go3 aa3?",en:"Not yet. Is that friend the one you have a crush on?"},

  dialogue:{
    title:"Dialogue: Talking Politics",
    lines:[
      {sp:"A",zh:"你有没有看今天的新闻？政府又出了新政策了。",jp:"nǐ yǒu méi yǒu kàn jīn tiān de xīn wén? zhèng fǔ yòu chū le xīn zhèng cè le.",en:"Did you see today\'s news? The government has announced a new policy again."},
      {sp:"B",zh:"看了，我不太支持这个政策，觉得对普通市民不公平。",jp:"kàn le, wǒ bù tài zhī chí zhè gè zhèng cè, jué de duì pǔ tōng shì mín bù gōng píng.",en:"I saw it. I don\'t really support this policy — I think it\'s unfair to ordinary citizens."},
      {sp:"A",zh:"我理解你的担忧，但我觉得他们是想解决贫富差距的问题。",jp:"wǒ lǐ jiě nǐ de dān yōu, dàn wǒ jué de tā men shì xiǎng jiě jué pín fù chā jù de wèn tí.",en:"I understand your concern, but I think they\'re trying to address the wealth gap."},
      {sp:"B",zh:"是，但是执行的方式有问题。言论自由和新闻自由都要保护。",jp:"shì, dàn shì zhí xíng de fāng shì yǒu wèn tí. yán lùn zì yóu hé xīn wén zì yóu dōu yào bǎo hù.",en:"Yes, but the way it\'s being implemented is problematic. Freedom of speech and the press both need to be protected."},
      {sp:"A",zh:"你说得对。这是一个很复杂的议题，不是三言两语可以说清楚的。",jp:"nǐ shuō de duì. zhè shì yī gè hěn fù zá de yì tí, bú shì sān yán liǎng yǔ kě yǐ shuō qīng chǔ de.",en:"You make a good point. This is a very complicated issue — it can\'t be explained in just a few words."},
    ]
  }

  dialogue:{
    title:"Dialogue: Talking About Investments",
    lines:[
      {sp:"A",zh:"你最近有没有关注股市？跌了很多啊。",jp:"nǐ zuì jìn yǒu méi yǒu guān zhù gǔ shì? diē le hěn duō a.",en:"Have you been watching the stock market lately? It\'s dropped a lot."},
      {sp:"B",zh:"是啊，通货膨胀和加息让股市很波动。我现在不敢乱买。",jp:"shì a, tōng huò péng zhàng hé jiā xī ràng gǔ shì hěn bō dòng. wǒ xiàn zài bù gǎn luàn mǎi.",en:"Yeah, inflation and rate hikes are making the market very volatile. I don\'t dare buy randomly now."},
      {sp:"A",zh:"我是长线投资那种，不管短期涨跌。买了指数基金就好了。",jp:"wǒ shì cháng xiàn tóu zī nà zhǒng, bù guǎn duǎn qī zhǎng diē. mǎi le zhǐ shù jī jīn jiù hǎo le.",en:"I\'m a long-term investor — I don\'t worry about short-term ups and downs. I just buy index funds."},
      {sp:"B",zh:"听起来很稳，但我始终觉得分散投资很重要。不能把所有鸡蛋放在同一个篮子里。",jp:"tīng qǐ lái hěn wěn, dàn wǒ shǐ zhōng jué de fēn sàn tóu zī hěn zhòng yào. bù néng bǎ suǒ yǒu jī dàn fàng zài tóng yī gè lán zi lǐ.",en:"That sounds stable, but I still think diversification is important. You can\'t put all your eggs in one basket."},
      {sp:"A",zh:"你说得很对。我也有买一些债券和加密货币作为对冲。",jp:"nǐ shuō de hěn duì. wǒ yě yǒu mǎi yī xiē zhài quàn hé jiā mì huò bì zuò wéi duì chōng.",en:"You\'re absolutely right. I also hold some bonds and crypto as a hedge."},
    ]

  dialogue:{
    title:"Dialogue: Career Change",
    lines:[
      {sp:"A",zh:"你最近说想换工作，是真的吗？",jp:"nǐ zuì jìn shuō xiǎng huàn gōng zuò, shì zhēn de ma?",en:"You mentioned recently that you want to change jobs — is that true?"},
      {sp:"B",zh:"是啊，我做这份工作五年了，一直没升职，而且加班的情况越来越严重。",jp:"shì a, wǒ zuò zhè fèn gōng zuò wǔ nián le, yī zhí méi shēng zhí, ér qiě jiā bān de qíng kuàng yuè lái yuè yán zhòng.",en:"Yeah, I\'ve been in this job for five years, never got promoted, and the overtime is getting worse and worse."},
      {sp:"A",zh:"我理解，工作和生活的平衡很重要。你有没有考虑过自己创业？",jp:"wǒ lǐ jiě, gōng zuò hé shēng huó de píng héng hěn zhòng yào. nǐ yǒu méi yǒu kǎo lǜ guò zì jǐ chuàng yè?",en:"I understand — work-life balance is very important. Have you considered starting your own business?"},
      {sp:"B",zh:"想过，但是风险很大。现在经济不太好，我不敢冒险。",jp:"xiǎng guò, dàn shì fēng xiǎn hěn dà. xiàn zài jīng jì bù tài hǎo, wǒ bù gǎn mào xiǎn.",en:"I\'ve thought about it, but the risk is high. The economy isn\'t great right now — I don\'t dare to take the risk."},
      {sp:"A",zh:"明白。那你可以先把简历整理好，试试去面试，看有没有更好的机会。",jp:"míng bai. nà nǐ kě yǐ xiān bǎ jiǎn lì zhěng lǐ hǎo, shì shì qù miàn shì, kàn yǒu méi yǒu gèng hǎo de jī huì.",en:"I understand. Then you could start by polishing your resume, try some interviews, and see if better opportunities come up."},

  dialogue:{
    title:"Dialogue: Planning a Trip",
    lines:[
      {sp:"A",zh:"你暑假有没有计划去旅行？",jp:"nǐ shǔ jià yǒu méi yǒu jì huà qù lǚ xíng?",en:"Do you have any travel plans for the summer?"},
      {sp:"B",zh:"有啊！我计划去日本，去京都和大阪。你呢？",jp:"yǒu a! wǒ jì huà qù rì běn, qù jīng dōu hé dà bǎn. nǐ ne?",en:"Yes! I\'m planning to go to Japan — Kyoto and Osaka. What about you?"},
      {sp:"A",zh:"我想去欧洲，但是机票很贵，还要申请签证，很麻烦。",jp:"wǒ xiǎng qù ōu zhōu, dàn shì jī piào hěn guì, hái yào shēn qǐng qiān zhèng, hěn má fan.",en:"I want to go to Europe, but flights are expensive and I still need to apply for a visa — such a hassle."},
      {sp:"B",zh:"是啊，签证很烦。日本不需要签证，方便多了。记得买旅游保险，很重要的。",jp:"shì a, qiān zhèng hěn fán. rì běn bù xū yào qiān zhèng, fāng biàn duō le. jì de mǎi lǚ yóu bǎo xiǎn, hěn zhòng yào de.",en:"Yeah, visas are a pain. Japan doesn\'t require one — much more convenient. Remember to buy travel insurance, it\'s really important."},
      {sp:"A",zh:"好，我会记住的。希望你玩得开心，带点纪念品回来！",jp:"hǎo, wǒ huì jì zhù de. xī wàng nǐ wán de kāi xīn, dài diǎn jì niàn pǐn huí lái!",en:"Okay, I\'ll remember. I hope you have a great time — bring back some souvenirs!"},

      {sp:"A",zh:"你儿子说想出国留学，你怎么看？",jp:"nǐ ér zi shuō xiǎng chū guó liú xué, nǐ zěn me kàn?",en:"Your son mentioned he wants to study abroad. What do you think?"},
      {sp:"B",zh:"我支持，但是学费真的很贵。美国和英国的学费贵得吓人。",jp:"wǒ zhī chí, dàn shì xué fèi zhēn de hěn guì. měi guó hé yīng guó de xué fèi guì de xià rén.",en:"I support it, but the tuition is really expensive. American and British university fees are frighteningly high."},
      {sp:"A",zh:"是，但是国外的学习环境和批判性思维的培养，真的有很大的不同。",jp:"shì, dàn shì guó wài de xué xí huán jìng hé pī pàn xìng sī wéi de péi yǎng, zhēn de yǒu hěn dà de bù tóng.",en:"Yes, but the learning environment and how they cultivate critical thinking abroad is genuinely very different."},
      {sp:"B",zh:"你说得对。而且现在竞争这么激烈，有海外学历也是一个优势。",jp:"nǐ shuō de duì. ér qiě xiàn zài jìng zhēng zhè me jī liè, yǒu hǎi wài xué lì yě shì yī gè yōu shì.",en:"You\'re right. And with competition so fierce nowadays, having an overseas degree is an advantage."},
      {sp:"A",zh:"他可以申请奖学金，不一定要自己付所有学费。",jp:"tā kě yǐ shēn qǐng jiǎng xué jīn, bù yī dìng yào zì jǐ fù suǒ yǒu xué fèi.",en:"He can apply for scholarships — he doesn\'t necessarily have to pay for all the tuition himself."},
    ]

  dialogue:{
    title:"Dialogue: Legal Dispute",
    lines:[
      {sp:"A",zh:"我现在有个很大的麻烦，房东不肯还我押金，说我损坏了他的家具。",jp:"wǒ xiàn zài yǒu gè hěn dà de má fan, fáng dōng bù kěn huán wǒ yā jīn, shuō wǒ sǔn huài le tā de jiā jù.",en:"I have a big problem. My landlord refuses to return my deposit, saying I damaged his furniture."},
      {sp:"B",zh:"那你有没有在搬走之前拍照留底？",jp:"nà nǐ yǒu méi yǒu zài bān zǒu zhī qián pāi zhào liú dǐ?",en:"Did you take photos before moving out?"},
      {sp:"A",zh:"有，全部都拍了，很清楚的。我觉得他是在冤枉我。",jp:"yǒu, quán bù dōu pāi le, hěn qīng chǔ de. wǒ jué de tā shì zài yuān wang wǒ.",en:"Yes, I photographed everything clearly. I feel like he\'s falsely accusing me."},
      {sp:"B",zh:"那你要认真考虑找律师，或者去消费者委员会投诉。这件事涉及你的合法权益。",jp:"nà nǐ yào rèn zhēn kǎo lǜ zhǎo lǜ shī, huò zhě qù xiāo fèi zhě wěi yuán huì tóu sù. zhè jiàn shì shè jí nǐ de hé fǎ quán yì.",en:"Then you should seriously consider finding a lawyer, or filing a complaint with the consumer council. This involves your legal rights."},
      {sp:"A",zh:"你说得对。我不能就这样算了，要维护自己的权利。",jp:"nǐ shuō de duì. wǒ bù néng jiù zhè yàng suàn le, yào wéi hù zì jǐ de quán lì.",en:"You\'re right. I can\'t just let it go — I need to protect my own rights."},
    ]

  dialogue:{
    title:"Dialogue: Where Are You From?",
    lines:[
      {sp:"A",zh:"你是哪里人？听口音不像是本地人。",jp:"nǐ shì nǎ lǐ rén? tīng kǒu yīn bù xiàng shì běn dì rén.",en:"Where are you from? Your accent doesn\'t sound local."},
      {sp:"B",zh:"我是广州人，来香港住了差不多十年了。",jp:"wǒ shì guǎng zhōu rén, lái xiāng gǎng zhù le chà bu duō shí nián le.",en:"I\'m from Guangzhou. I\'ve been living in Hong Kong for nearly ten years now."},
      {sp:"A",zh:"哇，那你一定很熟悉两个城市了。你觉得哪里更好住？",jp:"wā, nà nǐ yī dìng hěn shú xī liǎng gè chéng shì le. nǐ jué de nǎ lǐ gèng hǎo zhù?",en:"Wow, you must know both cities well. Which do you think is better to live in?"},
      {sp:"B",zh:"各有优点，广州生活费便宜一点，但香港是国际城市，机会多很多，文化也更多元。",jp:"gè yǒu yōu diǎn, guǎng zhōu shēng huó fèi pián yi yī diǎn, dàn xiāng gǎng shì guó jì chéng shì, jī huì duō hěn duō, wén huà yě gèng duō yuán.",en:"Both have their merits. Guangzhou is cheaper, but Hong Kong is an international city with far more opportunities and cultural diversity."},
      {sp:"A",zh:"就是这样，香港的地理位置也很好，是亚洲的中心点。",jp:"jiù shì zhè yàng, xiāng gǎng de dì lǐ wèi zhì yě hěn hǎo, shì yà zhōu de zhōng xīn diǎn.",en:"That\'s true — Hong Kong\'s geographical location is great, right at the center of Asia."},
    ]

  dialogue:{

    lines:[
      {sp:"A",zh:"今晚吃什么好？我肚子饿了。",jp:"jīn wǎn chī shén me hǎo? wǒ dù zi è le.",en:"What should we eat tonight? I\'m hungry."},
      {sp:"B",zh:"我想吃粤菜，好久没去吃点心了。不如去旺角那家茶楼？",jp:"wǒ xiǎng chī yuè cài, hǎo jiǔ méi qù chī diǎn xīn le. bù rú qù wàng jiǎo nà jiā chá lóu?",en:"I want Cantonese food — it\'s been ages since we had dim sum. How about the tea house in Mong Kok?"},
      {sp:"A",zh:"好啊！但是我有个朋友不吃肉，需要有素食选择的。",jp:"hǎo a! dàn shì wǒ yǒu gè péng you bù chī ròu, xū yào yǒu sù shí xuǎn zé de.",en:"Sure! But one of my friends doesn\'t eat meat, so there need to be vegetarian options."},
      {sp:"B",zh:"那家茶楼有很多素食点心，不用担心。记得预订座位，周末很多人的。",jp:"nà jiā chá lóu yǒu hěn duō sù shí diǎn xīn, bù yòng dān xīn. jì de yù dìng zuò wèi, zhōu mò hěn duō rén de.",en:"That tea house has lots of vegetarian dim sum — no worries. Remember to make a reservation, it gets very crowded on weekends."},
      {sp:"A",zh:"好，我现在就打电话去订位。你有没有什么不吃的？",jp:"hǎo, wǒ xiàn zài jiù dǎ diàn huà qù dìng wèi. nǐ yǒu méi yǒu shén me bù chī de?",en:"Okay, I\'ll call now to make a reservation. Is there anything you don\'t eat?"},

  dialogue:{
    title:"Dialogue: AI and the Future",
    lines:[
      {sp:"A",zh:"你怎么看人工智能的发展？真的会取代很多工作吗？",jp:"nǐ zěn me kàn rén gōng zhì néng de fā zhǎn? zhēn de huì qǔ dài hěn duō gōng zuò ma?",en:"What do you think about the development of AI? Will it really replace many jobs?"},
      {sp:"B",zh:"我觉得是，特别是重复性的工作，很快会被AI取代。但是创意和情感类的工作，暂时还是人类的强项。",jp:"wǒ jué de shì, tè bié shì chóng fù xìng de gōng zuò, hěn kuài huì bèi AI qǔ dài. dàn shì chuàng yì hé qíng gǎn lèi de gōng zuò, zàn shí hái shì rén lèi de qiáng xiàng.",en:"I think so — especially repetitive work, which will be replaced by AI very soon. But creative and emotional work is still humanity\'s strength for now."},
      {sp:"A",zh:"那我们是不是要尽快学习新技能，才能跟上？",jp:"nà wǒ men shì bù shì yào jǐn kuài xué xí xīn jì néng, cái néng gēn shàng?",en:"So do we need to quickly learn new skills to keep up?"},
      {sp:"B",zh:"是，终身学习是必须的。还有，要学会怎么跟AI合作，而不是抗拒它。",jp:"shì, zhōng shēn xué xí shì bì xū de. hái yǒu, yào xué huì zěn me gēn AI hé zuò, ér bú shì kàng jù tā.",en:"Yes, lifelong learning is essential. Also, we need to learn how to collaborate with AI rather than resist it."},

  dialogue:{

    lines:[
      {sp:"A",zh:"你最近好像很忙，家人有没有抱怨你？",jp:"nǐ zuì jìn hǎo xiàng hěn máng, jiā rén yǒu méi yǒu bào yuàn nǐ?",en:"You seem very busy lately. Have your family members complained?"},
      {sp:"B",zh:"是啊，老婆说我没有足够的时间陪她和孩子。其实我也知道是我的问题，但工作真的很忙。",jp:"shì a, lǎo po shuō wǒ méi yǒu zú gòu de shí jiān péi tā hé hái zi. qí shí wǒ yě zhī dào shì wǒ de wèn tí, dàn gōng zuò zhēn de hěn máng.",en:"Yeah, my wife says I don\'t spend enough time with her and the kids. I know it\'s my problem, but work is really busy."},
      {sp:"A",zh:"家人之间要多沟通。你有没有试过跟老婆坦白说，一起想办法？",jp:"jiā rén zhī jiān yào duō gōu tōng. nǐ yǒu méi yǒu shì guò gēn lǎo po tǎn bái shuō, yī qǐ xiǎng bàn fǎ?",en:"Family members need more communication. Have you tried being honest with your wife and figuring things out together?"},
      {sp:"B",zh:"谈过了，她很体谅，但我觉得自己很愧疚。工作和家庭要平衡，真的不容易。",jp:"tán guò le, tā hěn tǐ liàng, dàn wǒ jué de zì jǐ hěn kuì jiù. gōng zuò hé jiā tíng yào píng héng, zhēn de bù róng yì.",en:"We\'ve talked. She\'s very understanding, but I feel really guilty. Balancing work and family is truly not easy."},
      {sp:"A",zh:"是不容易，但是尊重和包容是最重要的。你的家人爱你，一起努力。",jp:"shì bù róng yì, dàn shì zūn zhòng hé bāo róng shì zuì zhòng yào de. nǐ de jiā rén ài nǐ, yī qǐ nǔ lì.",en:"It\'s not easy, but respect and tolerance are what matter most. Your family loves you — work on it together."},
    ]
